<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — EKG Shops Admin</title>
<link rel="stylesheet" href="/static/css/dashboard.css">
<style>
:root {
    --pri: #7c3aed; --pri-light: #ede9fe; --pri-dark: #5b21b6;
    --sur: #ffffff; --sur2: #f8fafc; --sur3: #f1f5f9;
    --bdr: #e2e8f0; --txt: #1e293b; --txt2: #64748b; --txt3: #94a3b8;
    --grn: #10b981; --grn-bg: #ecfdf5;
    --ylw: #f59e0b; --ylw-bg: #fffbeb;
    --red: #ef4444; --red-bg: #fef2f2;
    --blu: #3b82f6; --blu-bg: #eff6ff;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow2: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: var(--sur3); color: var(--txt); }
a { color: inherit; text-decoration: none; }

/* ── Top bar ── */
.topbar {
    background: var(--sur); border-bottom: 1px solid var(--bdr);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
}
.topbar-title { font-size: 18px; font-weight: 700; color: var(--pri); }
.topbar-back {
    display: flex; align-items: center; gap: 4px; font-size: 13px;
    color: var(--txt2); padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--bdr); background: var(--sur2);
    cursor: pointer; transition: all .15s;
}
.topbar-back:hover { background: var(--pri-light); color: var(--pri); border-color: var(--pri); }
.spacer { flex: 1; }
.day-select {
    padding: 6px 12px; border: 1px solid var(--bdr); border-radius: 8px;
    font-family: inherit; font-size: 13px; background: var(--sur2);
    cursor: pointer; outline: none;
}
.day-select:focus { border-color: var(--pri); }
.refresh-btn {
    padding: 6px 14px; border: none; border-radius: 8px;
    background: var(--pri); color: #fff; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: background .15s;
}
.refresh-btn:hover { background: var(--pri-dark); }

/* ── Layout ── */
.page { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* ── Summary cards ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; color: var(--txt3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--txt); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--txt3); margin-top: 4px; }
.stat-card.highlight .stat-value { color: var(--pri); }

/* ── Funnel bar ── */
.funnel-wrap {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 20px; box-shadow: var(--shadow); margin-bottom: 24px;
}
.section-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 14px; }
.funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.funnel-label { width: 130px; font-size: 12px; color: var(--txt2); flex-shrink: 0; }
.funnel-bar-wrap { flex: 1; background: var(--sur3); border-radius: 6px; height: 22px; overflow: hidden; }
.funnel-bar { height: 100%; border-radius: 6px; transition: width .5s ease; display: flex; align-items: center; padding-left: 8px; }
.funnel-count { font-size: 12px; font-weight: 600; color: #fff; }
.funnel-pct { width: 60px; font-size: 12px; color: var(--txt3); text-align: right; }

/* ── Two-column section ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
.card {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 20px; box-shadow: var(--shadow);
}

/* ── Table ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--txt3); border-bottom: 1px solid var(--bdr); }
.data-table td { padding: 9px 10px; border-bottom: 1px solid var(--bdr); vertical-align: top; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--sur2); }

/* ── User funnel table ── */
.user-table-wrap { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 24px; overflow: auto; }
.badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; background: var(--pri-light); color: var(--pri);
}
.badge.grn { background: var(--grn-bg); color: var(--grn); }
.badge.ylw { background: var(--ylw-bg); color: var(--ylw); }
.badge.red { background: var(--red-bg); color: var(--red); }
.dot-row { display: flex; gap: 4px; align-items: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.grn { background: var(--grn); }
.dot.ylw { background: var(--ylw); }
.dot.red { background: var(--red); }

/* ── Event log ── */
.event-log { font-size: 12px; }
.event-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--bdr); align-items: flex-start; }
.event-row:last-child { border-bottom: none; }
.event-icon { font-size: 14px; flex-shrink: 0; }
.event-meta { flex: 1; min-width: 0; }
.event-user { font-weight: 600; color: var(--txt); }
.event-type { color: var(--pri); font-size: 11px; font-weight: 600; }
.event-page { color: var(--txt3); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-time { color: var(--txt3); font-size: 11px; flex-shrink: 0; }

/* ── Bar chart ── */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-name { width: 150px; font-size: 12px; color: var(--txt); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--sur3); border-radius: 4px; height: 16px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: var(--pri); opacity: .85; transition: width .4s; }
.bar-val { width: 40px; text-align: right; font-size: 12px; color: var(--txt2); flex-shrink: 0; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: var(--txt3); }
.loading-spinner {
    width: 32px; height: 32px; border: 3px solid var(--bdr); border-top-color: var(--pri);
    border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
    <a href="/admin" class="topbar-back">← กลับ</a>
    <div class="topbar-title">📊 Analytics</div>
    <div class="spacer"></div>
    <select class="day-select" id="daySelect" onchange="loadData()">
        <option value="7">7 วัน</option>
        <option value="14">14 วัน</option>
        <option value="30">30 วัน</option>
        <option value="90">90 วัน</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">🔄 รีเฟรช</button>
</div>

<div class="page" id="pageRoot">
    <div class="loading">
        <div class="loading-spinner"></div>
        <div>กำลังโหลดข้อมูล...</div>
    </div>
</div>

<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const EVENT_ICONS = {
    page_view: '👁', product_view: '🔍', add_to_cart: '🛒',
    checkout_start: '💳', checkout_complete: '✅', search: '🔎',
    chatbot_message: '💬', login: '🔑', register: '🆕'
};

function timeAgo(iso) {
    const d = new Date(iso), now = new Date();
    const s = Math.floor((now - d) / 1000);
    if (s < 60) return `${s}s ที่แล้ว`;
    if (s < 3600) return `${Math.floor(s/60)}m ที่แล้ว`;
    if (s < 86400) return `${Math.floor(s/3600)}h ที่แล้ว`;
    return `${Math.floor(s/86400)}d ที่แล้ว`;
}

async function loadData() {
    document.getElementById('pageRoot').innerHTML =
        '<div class="loading"><div class="loading-spinner"></div><div>กำลังโหลดข้อมูล...</div></div>';
    const days = document.getElementById('daySelect').value;
    const res  = await fetch(`/api/admin/analytics/data?days=${days}`);
    const d    = await res.json();
    if (d.error) { document.getElementById('pageRoot').innerHTML = `<p style="padding:40px;color:red">${esc(d.error)}</p>`; return; }
    render(d);
}

function render(d) {
    const { summary: s, top_pages, top_products, event_breakdown, recent, user_funnel, days } = d;

    const totalMembers = s.total_members || 0;
    const activeUsers  = s.active_users  || 0;
    const cartUsers    = s.cart_users    || 0;
    const checkoutU    = s.checkout_users|| 0;
    const buyers       = s.buyers        || 0;

    // Stat cards
    const statsHtml = `
    <div class="stat-grid">
        <div class="stat-card highlight">
            <div class="stat-label">สมาชิกทั้งหมด</div>
            <div class="stat-value">${totalMembers.toLocaleString()}</div>
            <div class="stat-sub">registered</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active ${days} วัน</div>
            <div class="stat-value">${activeUsers.toLocaleString()}</div>
            <div class="stat-sub">${totalMembers ? Math.round(activeUsers/totalMembers*100) : 0}% ของทั้งหมด</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sessions</div>
            <div class="stat-value">${(s.sessions||0).toLocaleString()}</div>
            <div class="stat-sub">การเข้าชม</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Events</div>
            <div class="stat-value">${(s.total_events||0).toLocaleString()}</div>
            <div class="stat-sub">กิจกรรมทั้งหมด</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ใส่ตะกร้า</div>
            <div class="stat-value">${cartUsers.toLocaleString()}</div>
            <div class="stat-sub">คน</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">สั่งซื้อแล้ว</div>
            <div class="stat-value">${buyers.toLocaleString()}</div>
            <div class="stat-sub">conversion</div>
        </div>
    </div>`;

    // Funnel
    const funnelBase = activeUsers || 1;
    const funnelItems = [
        { label: 'เข้าใช้งาน',     val: activeUsers, color: '#7c3aed' },
        { label: 'ดูสินค้า',       val: s.active_users||0, color: '#3b82f6' },
        { label: 'ใส่ตะกร้า',      val: cartUsers, color: '#f59e0b' },
        { label: 'เริ่ม Checkout', val: checkoutU, color: '#ef4444' },
        { label: 'สั่งซื้อสำเร็จ', val: buyers, color: '#10b981' },
    ];
    const funnelHtml = `
    <div class="funnel-wrap">
        <div class="section-title">🔻 Conversion Funnel</div>
        ${funnelItems.map(f => {
            const pct = funnelBase > 0 ? Math.round(f.val/funnelBase*100) : 0;
            const w   = Math.max(pct, 3);
            return `<div class="funnel-row">
                <div class="funnel-label">${esc(f.label)}</div>
                <div class="funnel-bar-wrap">
                    <div class="funnel-bar" style="width:${w}%;background:${f.color}">
                        <span class="funnel-count">${f.val.toLocaleString()}</span>
                    </div>
                </div>
                <div class="funnel-pct">${pct}%</div>
            </div>`;
        }).join('')}
    </div>`;

    // Top pages bar chart
    const maxPageViews = top_pages[0]?.views || 1;
    const topPagesHtml = `
    <div class="card">
        <div class="section-title">📄 หน้าที่เข้าบ่อย</div>
        <div class="bar-chart">
            ${top_pages.map(p => `
            <div class="bar-row">
                <div class="bar-name" title="${esc(p.page)}">${esc(p.page||'/')}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.views/maxPageViews*100)}%"></div></div>
                <div class="bar-val">${p.views}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    // Top products
    const maxProdViews = top_products[0]?.views || 1;
    const topProductsHtml = `
    <div class="card">
        <div class="section-title">👗 สินค้าที่ดูบ่อย</div>
        <div class="bar-chart">
            ${top_products.map(p => `
            <div class="bar-row">
                <div class="bar-name" title="${esc(p.product)}">${esc(p.product||'-')}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.views/maxProdViews*100)}%;background:#3b82f6"></div></div>
                <div class="bar-val">${p.views}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    // User funnel table
    const userFunnelHtml = `
    <div class="user-table-wrap">
        <div class="section-title">👥 พฤติกรรมรายคน (${days} วันล่าสุด)</div>
        <table class="data-table">
            <thead><tr>
                <th>สมาชิก</th><th>Tier</th><th>เข้าดูล่าสุด</th>
                <th>Page Views</th><th>ดูสินค้า</th><th>ใส่ตะกร้า</th>
                <th>Checkout</th><th>ค้นหา</th><th>สถานะ</th>
            </tr></thead>
            <tbody>
            ${user_funnel.map(u => {
                const stage = u.checkout_starts > 0 ? 'checkout' : u.cart_adds > 0 ? 'cart' : u.product_views > 0 ? 'browsing' : 'new';
                const stageLabel = { checkout:'💳 Checkout', cart:'🛒 ตะกร้า', browsing:'🔍 เรียกดู', new:'🆕 ใหม่' }[stage];
                const stageCls   = { checkout:'ylw', cart:'ylw', browsing:'', new:'' }[stage];
                return `<tr>
                    <td><strong>${esc(u.full_name||u.username)}</strong><br><span style="color:var(--txt3);font-size:11px">@${esc(u.username)}</span></td>
                    <td><span class="badge">${esc(u.reseller_tier||'—')}</span></td>
                    <td style="font-size:12px;color:var(--txt2)">${u.last_seen ? timeAgo(u.last_seen) : '—'}</td>
                    <td style="text-align:center">${u.page_views||0}</td>
                    <td style="text-align:center">${u.product_views||0}</td>
                    <td style="text-align:center;font-weight:${u.cart_adds>0?'700':'400'};color:${u.cart_adds>0?'var(--ylw)':'inherit'}">${u.cart_adds||0}</td>
                    <td style="text-align:center;font-weight:${u.checkout_starts>0?'700':'400'};color:${u.checkout_starts>0?'var(--red)':'inherit'}">${u.checkout_starts||0}</td>
                    <td style="text-align:center">${u.searches||0}</td>
                    <td><span class="badge ${stageCls}">${stageLabel}</span></td>
                </tr>`;
            }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--txt3);padding:24px">ยังไม่มีข้อมูล — เริ่มใช้งานเมื่อสมาชิก login แล้ว</td></tr>'}
            </tbody>
        </table>
    </div>`;

    // Recent events
    const recentHtml = `
    <div class="card">
        <div class="section-title">🕐 กิจกรรมล่าสุด</div>
        <div class="event-log">
            ${recent.slice(0,30).map(e => `
            <div class="event-row">
                <div class="event-icon">${EVENT_ICONS[e.event_type]||'•'}</div>
                <div class="event-meta">
                    <div class="event-user">${esc(e.full_name||e.username||'Guest')}</div>
                    <div><span class="event-type">${esc(e.event_type)}</span></div>
                    <div class="event-page">${esc(e.page||'')}</div>
                </div>
                <div class="event-time">${e.created_at ? timeAgo(e.created_at) : ''}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    // Event breakdown
    const maxEvt = event_breakdown[0]?.cnt || 1;
    const evtHtml = `
    <div class="card">
        <div class="section-title">⚡ ประเภทกิจกรรม</div>
        <div class="bar-chart">
            ${event_breakdown.map(e => `
            <div class="bar-row">
                <div class="bar-name">${EVENT_ICONS[e.event_type]||'•'} ${esc(e.event_type)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.cnt/maxEvt*100)}%;background:#10b981"></div></div>
                <div class="bar-val">${e.cnt}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    document.getElementById('pageRoot').innerHTML =
        statsHtml + funnelHtml +
        `<div class="two-col">${topPagesHtml}${topProductsHtml}</div>` +
        userFunnelHtml +
        `<div class="two-col">${recentHtml}${evtHtml}</div>`;
}

loadData();
</script>
</body>
</html>
