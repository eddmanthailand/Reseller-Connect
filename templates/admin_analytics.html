<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — EKG Shops Admin</title>
<link rel="stylesheet" href="/static/css/dashboard.css">
<style>
:root {
    --pri: #7c3aed; --pri-light: #ede9fe; --pri-dark: #5b21b6;
    --sur: #ffffff; --sur2: #f8fafc; --sur3: #f1f5f9;
    --bdr: #e2e8f0; --txt: #1e293b; --txt2: #64748b; --txt3: #94a3b8;
    --grn: #10b981; --grn-bg: #ecfdf5;
    --ylw: #f59e0b; --ylw-bg: #fffbeb;
    --red: #ef4444; --red-bg: #fef2f2;
    --blu: #3b82f6; --blu-bg: #eff6ff;
    --ora: #f97316; --ora-bg: #fff7ed;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow2: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: var(--sur3); color: var(--txt); }
a { color: inherit; text-decoration: none; }

/* ── Top bar ── */
.topbar {
    background: var(--sur); border-bottom: 1px solid var(--bdr);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
    flex-wrap: wrap;
}
.topbar-title { font-size: 18px; font-weight: 700; color: var(--pri); }
.topbar-back {
    display: flex; align-items: center; gap: 4px; font-size: 13px;
    color: var(--txt2); padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--bdr); background: var(--sur2);
    cursor: pointer; transition: all .15s;
}
.topbar-back:hover { background: var(--pri-light); color: var(--pri); border-color: var(--pri); }
.spacer { flex: 1; }
.day-select {
    padding: 6px 12px; border: 1px solid var(--bdr); border-radius: 8px;
    font-family: inherit; font-size: 13px; background: var(--sur2);
    cursor: pointer; outline: none;
}
.day-select:focus { border-color: var(--pri); }
.refresh-btn {
    padding: 6px 14px; border: none; border-radius: 8px;
    background: var(--pri); color: #fff; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: background .15s;
}
.refresh-btn:hover { background: var(--pri-dark); }

/* ── Tabs ── */
.tab-bar {
    background: var(--sur); border-bottom: 1px solid var(--bdr);
    padding: 0 24px; display: flex; gap: 0;
}
.tab-btn {
    padding: 12px 20px; font-size: 13px; font-weight: 600; font-family: inherit;
    border: none; background: none; cursor: pointer; color: var(--txt2);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
}
.tab-btn:hover { color: var(--pri); }
.tab-btn.active { color: var(--pri); border-bottom-color: var(--pri); }

/* ── Layout ── */
.page { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* ── Summary cards ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; color: var(--txt3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--txt); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--txt3); margin-top: 4px; }
.stat-card.highlight .stat-value { color: var(--pri); }

/* ── Funnel ── */
.funnel-wrap {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 20px; box-shadow: var(--shadow); margin-bottom: 24px;
}
.section-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 14px; }
.section-sub { font-size: 12px; color: var(--txt3); margin-top: -10px; margin-bottom: 14px; }
.funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.funnel-label { width: 130px; font-size: 12px; color: var(--txt2); flex-shrink: 0; }
.funnel-bar-wrap { flex: 1; background: var(--sur3); border-radius: 6px; height: 22px; overflow: hidden; }
.funnel-bar { height: 100%; border-radius: 6px; transition: width .5s ease; display: flex; align-items: center; padding-left: 8px; }
.funnel-count { font-size: 12px; font-weight: 600; color: #fff; }
.funnel-pct { width: 60px; font-size: 12px; color: var(--txt3); text-align: right; }

/* ── Two-column ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 900px) { .three-col { grid-template-columns: 1fr; } }
.card {
    background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 20px; box-shadow: var(--shadow);
}
.card-mb { margin-bottom: 24px; }

/* ── Table ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--txt3); border-bottom: 1px solid var(--bdr); }
.data-table td { padding: 9px 10px; border-bottom: 1px solid var(--bdr); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--sur2); }
.data-table td.num { text-align: center; font-variant-numeric: tabular-nums; }

/* ── User funnel table ── */
.user-table-wrap { background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 24px; overflow: auto; }
.badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; background: var(--pri-light); color: var(--pri);
}
.badge.grn { background: var(--grn-bg); color: var(--grn); }
.badge.ylw { background: var(--ylw-bg); color: var(--ylw); }
.badge.red { background: var(--red-bg); color: var(--red); }
.badge.blu { background: var(--blu-bg); color: var(--blu); }
.badge.ora { background: var(--ora-bg); color: var(--ora); }
.dot-row { display: flex; gap: 4px; align-items: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.grn { background: var(--grn); }
.dot.ylw { background: var(--ylw); }
.dot.red { background: var(--red); }

/* ── Event log ── */
.event-log { font-size: 12px; }
.event-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--bdr); align-items: flex-start; }
.event-row:last-child { border-bottom: none; }
.event-icon { font-size: 14px; flex-shrink: 0; }
.event-meta { flex: 1; min-width: 0; }
.event-user { font-weight: 600; color: var(--txt); }
.event-type { color: var(--pri); font-size: 11px; font-weight: 600; }
.event-page { color: var(--txt3); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-time { color: var(--txt3); font-size: 11px; flex-shrink: 0; }

/* ── Bar chart ── */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-name { width: 150px; font-size: 12px; color: var(--txt); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--sur3); border-radius: 4px; height: 16px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: var(--pri); opacity: .85; transition: width .4s; }
.bar-val { width: 40px; text-align: right; font-size: 12px; color: var(--txt2); flex-shrink: 0; }

/* ── Hour heatmap ── */
.hour-grid {
    display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; margin-top: 8px;
}
.hour-cell {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.hour-bar-wrap {
    width: 100%; height: 60px; background: var(--sur3); border-radius: 4px;
    display: flex; align-items: flex-end; overflow: hidden;
}
.hour-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--pri); opacity: .7; transition: height .4s; min-height: 2px; }
.hour-bar.peak { background: var(--red); opacity: .85; }
.hour-label { font-size: 9px; color: var(--txt3); }
.hour-cnt { font-size: 9px; color: var(--pri); font-weight: 600; }

/* ── DOW bars ── */
.dow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 8px; }
.dow-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.dow-bar-wrap { width: 100%; height: 70px; background: var(--sur3); border-radius: 6px; display: flex; align-items: flex-end; overflow: hidden; }
.dow-bar { width: 100%; border-radius: 6px 6px 0 0; background: var(--blu); opacity: .75; transition: height .4s; min-height: 2px; }
.dow-label { font-size: 11px; color: var(--txt2); font-weight: 600; }
.dow-cnt { font-size: 10px; color: var(--blu); font-weight: 600; }

/* ── Interest gap ── */
.gap-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--bdr);
}
.gap-item:last-child { border-bottom: none; }
.gap-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gap-views { font-size: 12px; color: var(--txt2); flex-shrink: 0; }
.gap-pill {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    flex-shrink: 0;
}
.gap-pill.hot { background: var(--red-bg); color: var(--red); }
.gap-pill.warn { background: var(--ylw-bg); color: var(--ylw); }
.gap-pill.ok { background: var(--grn-bg); color: var(--grn); }

/* ── Engagement leaderboard ── */
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--bdr); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { width: 24px; font-size: 13px; font-weight: 700; color: var(--txt3); flex-shrink: 0; text-align: center; }
.lb-name { flex: 1; min-width: 0; }
.lb-name-main { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-name-sub { font-size: 11px; color: var(--txt3); }
.lb-score { font-size: 16px; font-weight: 700; color: var(--pri); flex-shrink: 0; }
.lb-details { display: flex; gap: 6px; flex-shrink: 0; }
.lb-ev { font-size: 10px; color: var(--txt3); }

/* ── Tier breakdown ── */
.tier-grid { display: grid; gap: 12px; }
.tier-row {
    background: var(--sur2); border: 1px solid var(--bdr); border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.tier-name { font-size: 14px; font-weight: 700; color: var(--pri); min-width: 100px; }
.tier-stat { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
.tier-stat-val { font-size: 18px; font-weight: 700; color: var(--txt); }
.tier-stat-lbl { font-size: 10px; color: var(--txt3); text-transform: uppercase; }
.tier-bar { flex: 1; min-width: 120px; }
.tier-bar-label { font-size: 10px; color: var(--txt3); margin-bottom: 3px; }
.tier-bar-track { background: var(--sur3); border-radius: 4px; height: 8px; overflow: hidden; }
.tier-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: var(--txt3); }
.loading-spinner {
    width: 32px; height: 32px; border: 3px solid var(--bdr); border-top-color: var(--pri);
    border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Insight callout ── */
.insight-box {
    background: var(--pri-light); border: 1px solid var(--pri); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start;
}
.insight-icon { font-size: 18px; flex-shrink: 0; }
.insight-text { font-size: 13px; color: var(--pri-dark); line-height: 1.5; }
.insight-text strong { font-weight: 700; }
</style>
</head>
<body>

<div class="topbar">
    <a href="/admin" class="topbar-back">← กลับ</a>
    <div class="topbar-title">📊 Analytics</div>
    <div class="spacer"></div>
    <select class="day-select" id="daySelect" onchange="onDaysChange()">
        <option value="7">7 วัน</option>
        <option value="14">14 วัน</option>
        <option value="30" selected>30 วัน</option>
        <option value="90">90 วัน</option>
    </select>
    <button class="refresh-btn" onclick="reloadCurrent()">🔄 รีเฟรช</button>
</div>

<div class="tab-bar">
    <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">📈 ภาพรวม</button>
    <button class="tab-btn" id="tab-behavior" onclick="switchTab('behavior')">🧠 พฤติกรรมสมาชิก</button>
</div>

<div class="page" id="pageRoot">
    <div class="loading"><div class="loading-spinner"></div><div>กำลังโหลดข้อมูล...</div></div>
</div>

<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const EVENT_ICONS = {
    page_view: '👁', product_view: '🔍', add_to_cart: '🛒',
    checkout_start: '💳', checkout_complete: '✅', search: '🔎',
    chatbot_message: '💬', login: '🔑', register: '🆕'
};

let currentTab = 'overview';

function timeAgo(iso) {
    const d = new Date(iso), now = new Date();
    const s = Math.floor((now - d) / 1000);
    if (s < 60) return `${s}s ที่แล้ว`;
    if (s < 3600) return `${Math.floor(s/60)}m ที่แล้ว`;
    if (s < 86400) return `${Math.floor(s/3600)}h ที่แล้ว`;
    return `${Math.floor(s/86400)}d ที่แล้ว`;
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    reloadCurrent();
}

function onDaysChange() { reloadCurrent(); }

function reloadCurrent() {
    if (currentTab === 'overview') loadOverview();
    else loadBehavior();
}

// ════════════════════════════════════════════
// TAB 1: ภาพรวม
// ════════════════════════════════════════════
async function loadOverview() {
    document.getElementById('pageRoot').innerHTML =
        '<div class="loading"><div class="loading-spinner"></div><div>กำลังโหลดข้อมูล...</div></div>';
    const days = document.getElementById('daySelect').value;
    const res  = await fetch(`/api/admin/analytics/data?days=${days}`);
    const d    = await res.json();
    if (d.error) { document.getElementById('pageRoot').innerHTML = `<p style="padding:40px;color:red">${esc(d.error)}</p>`; return; }
    renderOverview(d);
}

function renderOverview(d) {
    const { summary: s, top_pages, top_products, event_breakdown, recent, user_funnel, days } = d;

    const totalMembers = s.total_members || 0;
    const activeUsers  = s.active_users  || 0;
    const cartUsers    = s.cart_users    || 0;
    const checkoutU    = s.checkout_users|| 0;
    const buyers       = s.buyers        || 0;

    const statsHtml = `
    <div class="stat-grid">
        <div class="stat-card highlight">
            <div class="stat-label">สมาชิกทั้งหมด</div>
            <div class="stat-value">${totalMembers.toLocaleString()}</div>
            <div class="stat-sub">registered</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active ${days} วัน</div>
            <div class="stat-value">${activeUsers.toLocaleString()}</div>
            <div class="stat-sub">${totalMembers ? Math.round(activeUsers/totalMembers*100) : 0}% ของทั้งหมด</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sessions</div>
            <div class="stat-value">${(s.sessions||0).toLocaleString()}</div>
            <div class="stat-sub">การเข้าชม</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Events</div>
            <div class="stat-value">${(s.total_events||0).toLocaleString()}</div>
            <div class="stat-sub">กิจกรรมทั้งหมด</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ใส่ตะกร้า</div>
            <div class="stat-value">${cartUsers.toLocaleString()}</div>
            <div class="stat-sub">คน</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">สั่งซื้อแล้ว</div>
            <div class="stat-value">${buyers.toLocaleString()}</div>
            <div class="stat-sub">conversion</div>
        </div>
    </div>`;

    const funnelBase = activeUsers || 1;
    const funnelItems = [
        { label: 'เข้าใช้งาน',      val: activeUsers,        color: '#7c3aed' },
        { label: 'ดูสินค้า',        val: s.product_view_users||activeUsers, color: '#3b82f6' },
        { label: 'ใส่ตะกร้า',       val: cartUsers,           color: '#f59e0b' },
        { label: 'เริ่ม Checkout',  val: checkoutU,           color: '#ef4444' },
        { label: 'สั่งซื้อสำเร็จ',  val: buyers,             color: '#10b981' },
    ];
    const funnelHtml = `
    <div class="funnel-wrap">
        <div class="section-title">🔻 Conversion Funnel (${days} วันล่าสุด)</div>
        ${funnelItems.map(f => {
            const pct = funnelBase > 0 ? Math.round(f.val/funnelBase*100) : 0;
            const w   = Math.max(pct, 3);
            return `<div class="funnel-row">
                <div class="funnel-label">${esc(f.label)}</div>
                <div class="funnel-bar-wrap">
                    <div class="funnel-bar" style="width:${w}%;background:${f.color}">
                        <span class="funnel-count">${f.val.toLocaleString()}</span>
                    </div>
                </div>
                <div class="funnel-pct">${pct}%</div>
            </div>`;
        }).join('')}
    </div>`;

    const maxPageViews = top_pages[0]?.views || 1;
    const topPagesHtml = `
    <div class="card">
        <div class="section-title">📄 หน้าที่เข้าบ่อย</div>
        <div class="bar-chart">
            ${top_pages.map(p => `
            <div class="bar-row">
                <div class="bar-name" title="${esc(p.page)}">${esc(p.page||'/')}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.views/maxPageViews*100)}%"></div></div>
                <div class="bar-val">${p.views}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px;padding:8px 0">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    const maxProdViews = top_products[0]?.views || 1;
    const topProductsHtml = `
    <div class="card">
        <div class="section-title">👗 สินค้าที่ดูบ่อย</div>
        <div class="bar-chart">
            ${top_products.map(p => `
            <div class="bar-row">
                <div class="bar-name" title="${esc(p.product)}">${esc(p.product||'-')}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.views/maxProdViews*100)}%;background:#3b82f6"></div></div>
                <div class="bar-val">${p.views}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px;padding:8px 0">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    const userFunnelHtml = `
    <div class="user-table-wrap">
        <div class="section-title">👥 พฤติกรรมรายคน (${days} วันล่าสุด)</div>
        <div style="overflow:auto">
        <table class="data-table">
            <thead><tr>
                <th>สมาชิก</th><th>Tier</th><th>เข้าดูล่าสุด</th>
                <th>Page Views</th><th>ดูสินค้า</th><th>ใส่ตะกร้า</th>
                <th>Checkout</th><th>ค้นหา</th><th>สถานะ</th>
            </tr></thead>
            <tbody>
            ${user_funnel.map(u => {
                const stage = u.checkout_starts > 0 ? 'checkout' : u.cart_adds > 0 ? 'cart' : u.product_views > 0 ? 'browsing' : 'new';
                const stageLabel = { checkout:'💳 Checkout', cart:'🛒 ตะกร้า', browsing:'🔍 เรียกดู', new:'🆕 ใหม่' }[stage];
                const stageCls   = { checkout:'ylw', cart:'ylw', browsing:'blu', new:'' }[stage];
                return `<tr>
                    <td><strong>${esc(u.full_name||u.username)}</strong><br><span style="color:var(--txt3);font-size:11px">@${esc(u.username)}</span></td>
                    <td><span class="badge">${esc(u.reseller_tier||'—')}</span></td>
                    <td style="font-size:12px;color:var(--txt2)">${u.last_seen ? timeAgo(u.last_seen) : '—'}</td>
                    <td class="num">${u.page_views||0}</td>
                    <td class="num">${u.product_views||0}</td>
                    <td class="num" style="font-weight:${u.cart_adds>0?'700':'400'};color:${u.cart_adds>0?'var(--ylw)':'inherit'}">${u.cart_adds||0}</td>
                    <td class="num" style="font-weight:${u.checkout_starts>0?'700':'400'};color:${u.checkout_starts>0?'var(--red)':'inherit'}">${u.checkout_starts||0}</td>
                    <td class="num">${u.searches||0}</td>
                    <td><span class="badge ${stageCls}">${stageLabel}</span></td>
                </tr>`;
            }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--txt3);padding:24px">ยังไม่มีข้อมูล — เริ่มใช้งานเมื่อสมาชิก login แล้ว</td></tr>'}
            </tbody>
        </table>
        </div>
    </div>`;

    const recentHtml = `
    <div class="card">
        <div class="section-title">🕐 กิจกรรมล่าสุด</div>
        <div class="event-log">
            ${recent.slice(0,30).map(e => `
            <div class="event-row">
                <div class="event-icon">${EVENT_ICONS[e.event_type]||'•'}</div>
                <div class="event-meta">
                    <div class="event-user">${esc(e.full_name||e.username||'Guest')}</div>
                    <div><span class="event-type">${esc(e.event_type)}</span>${e.metadata?.product_name ? ' <span style="color:var(--txt2);font-size:11px">'+esc(e.metadata.product_name)+'</span>' : ''}</div>
                    <div class="event-page">${esc(e.page||'')}</div>
                </div>
                <div class="event-time">${e.created_at ? timeAgo(e.created_at) : ''}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    const maxEvt = event_breakdown[0]?.cnt || 1;
    const evtHtml = `
    <div class="card">
        <div class="section-title">⚡ ประเภทกิจกรรม</div>
        <div class="bar-chart">
            ${event_breakdown.map(e => `
            <div class="bar-row">
                <div class="bar-name">${EVENT_ICONS[e.event_type]||'•'} ${esc(e.event_type)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.round(e.cnt/maxEvt*100)}%;background:#10b981"></div></div>
                <div class="bar-val">${e.cnt}</div>
            </div>`).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    document.getElementById('pageRoot').innerHTML =
        statsHtml + funnelHtml +
        `<div class="two-col">${topPagesHtml}${topProductsHtml}</div>` +
        userFunnelHtml +
        `<div class="two-col">${recentHtml}${evtHtml}</div>`;
}

// ════════════════════════════════════════════
// TAB 2: พฤติกรรมสมาชิก
// ════════════════════════════════════════════
async function loadBehavior() {
    document.getElementById('pageRoot').innerHTML =
        '<div class="loading"><div class="loading-spinner"></div><div>กำลังวิเคราะห์พฤติกรรม...</div></div>';
    const days = document.getElementById('daySelect').value;
    const res  = await fetch(`/api/admin/analytics/behavior?days=${days}`);
    const d    = await res.json();
    if (d.error) { document.getElementById('pageRoot').innerHTML = `<p style="padding:40px;color:red">${esc(d.error)}</p>`; return; }
    renderBehavior(d);
}

function renderBehavior(d) {
    const { hours, dow, tier_breakdown, interest_gap, sections, engagement, days } = d;

    // ── 1. Active hours heatmap ──
    const maxHour = Math.max(...hours.map(h => h.cnt), 1);
    const peakHour = hours.reduce((a, b) => b.cnt > a.cnt ? b : a, hours[0]);
    const hourHtml = `
    <div class="card card-mb">
        <div class="section-title">🕐 เวลาที่ตัวแทนใช้งานมากที่สุด</div>
        <div class="section-sub">แต่ละแท่งแสดงจำนวน event ในชั่วโมงนั้น — สีแดงคือชั่วโมง peak</div>
        <div class="hour-grid">
            ${hours.map(h => {
                const pct = maxHour > 0 ? Math.round(h.cnt/maxHour*100) : 0;
                const isPeak = h.cnt > 0 && h.cnt === peakHour.cnt;
                const label = h.hour < 12 ? `${h.hour}am` : h.hour === 12 ? '12pm' : `${h.hour-12}pm`;
                return `<div class="hour-cell">
                    <div class="hour-cnt">${h.cnt > 0 ? h.cnt : ''}</div>
                    <div class="hour-bar-wrap">
                        <div class="hour-bar ${isPeak?'peak':''}" style="height:${pct}%"></div>
                    </div>
                    <div class="hour-label">${label}</div>
                </div>`;
            }).join('')}
        </div>
        ${peakHour && peakHour.cnt > 0 ? `
        <div style="margin-top:12px;font-size:12px;color:var(--txt2)">
            🔴 Peak: <strong>${peakHour.hour < 12 ? peakHour.hour+'am' : peakHour.hour===12?'12pm':(peakHour.hour-12)+'pm'}</strong>
            (${peakHour.cnt} events)
        </div>` : '<div style="margin-top:12px;font-size:12px;color:var(--txt3)">ยังไม่มีข้อมูลพอ — จะเห็นผลเมื่อมีการใช้งานมากขึ้น</div>'}
    </div>`;

    // ── 2. Day of week ──
    const maxDow = Math.max(...dow.map(d => d.cnt), 1);
    const peakDow = dow.reduce((a, b) => b.cnt > a.cnt ? b : a, dow[0]);
    const dayColors = ['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6'];
    const dowHtml = `
    <div class="card card-mb">
        <div class="section-title">📅 วันที่ใช้งานมากสุดในสัปดาห์</div>
        <div class="dow-grid">
            ${dow.map((dw, i) => {
                const pct = maxDow > 0 ? Math.round(dw.cnt/maxDow*100) : 0;
                return `<div class="dow-cell">
                    <div class="dow-cnt">${dw.cnt > 0 ? dw.cnt : '0'}</div>
                    <div class="dow-bar-wrap">
                        <div class="dow-bar" style="height:${pct}%;background:${dayColors[i]}"></div>
                    </div>
                    <div class="dow-label">${dw.day}</div>
                </div>`;
            }).join('')}
        </div>
        ${peakDow && peakDow.cnt > 0 ? `<div style="margin-top:10px;font-size:12px;color:var(--txt2)">วันยอดนิยม: <strong>วัน${peakDow.day}</strong> (${peakDow.cnt} events)</div>` : ''}
    </div>`;

    // ── 3. Section engagement ──
    const maxSection = sections[0]?.cnt || 1;
    const sectionColors = { 'แคตตาล็อกสินค้า':'#7c3aed','ตะกร้าสินค้า':'#f59e0b','Checkout':'#ef4444','ประวัติออเดอร์':'#3b82f6','โปรไฟล์':'#10b981','แชท':'#ec4899','โปรโมชัน':'#f97316','หน้าหลัก':'#64748b','หน้าหลักตัวแทน':'#64748b' };
    const sectionHtml = `
    <div class="card card-mb">
        <div class="section-title">🗺️ Section ที่ตัวแทนใช้งานบ่อย</div>
        <div class="bar-chart">
            ${sections.map(s => {
                const color = sectionColors[s.section] || '#94a3b8';
                return `<div class="bar-row">
                    <div class="bar-name" title="${esc(s.section)}">${esc(s.section)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.cnt/maxSection*100)}%;background:${color}"></div></div>
                    <div class="bar-val" style="color:var(--txt2)">${s.cnt} <span style="font-size:10px;color:var(--txt3)">(${s.users}คน)</span></div>
                </div>`;
            }).join('') || '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>'}
        </div>
    </div>`;

    // ── 4. Tier behavior breakdown ──
    const maxTierViews = Math.max(...(tier_breakdown.map(t => Number(t.page_views)||0)), 1);
    const tierHtml = `
    <div class="card card-mb">
        <div class="section-title">📊 พฤติกรรมแยกตามระดับตัวแทน</div>
        ${tier_breakdown.length === 0 ? '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>' : ''}
        <div class="tier-grid">
            ${tier_breakdown.map(t => {
                const pvPct   = maxTierViews > 0 ? Math.round((Number(t.page_views)||0)/maxTierViews*100) : 0;
                const prodPct = Number(t.page_views) > 0 ? Math.round((Number(t.product_views)||0)/Number(t.page_views)*100) : 0;
                const cartPct = Number(t.product_views) > 0 ? Math.round((Number(t.cart_adds)||0)/Number(t.product_views)*100) : 0;
                const tierCol = { 'Bronze':'#cd7f32','Silver':'#94a3b8','Gold':'#f59e0b','Platinum':'#7c3aed','Diamond':'#3b82f6' };
                const col = tierCol[t.tier] || '#64748b';
                return `<div class="tier-row">
                    <div class="tier-name" style="color:${col}">${esc(t.tier)}</div>
                    <div class="tier-stat"><div class="tier-stat-val">${t.members}</div><div class="tier-stat-lbl">คน</div></div>
                    <div class="tier-stat"><div class="tier-stat-val">${t.page_views||0}</div><div class="tier-stat-lbl">page views</div></div>
                    <div class="tier-stat"><div class="tier-stat-val">${t.product_views||0}</div><div class="tier-stat-lbl">ดูสินค้า</div></div>
                    <div class="tier-stat"><div class="tier-stat-val" style="color:${cartPct>10?'var(--ylw)':'inherit'}">${t.cart_adds||0}</div><div class="tier-stat-lbl">ตะกร้า</div></div>
                    <div class="tier-bar">
                        <div class="tier-bar-label">Activity level</div>
                        <div class="tier-bar-track"><div class="tier-bar-fill" style="width:${pvPct}%;background:${col}"></div></div>
                    </div>
                </div>`;
            }).join('')}
        </div>
    </div>`;

    // ── 5. Product interest gap ──
    const gapHtml = `
    <div class="card card-mb">
        <div class="section-title">🛍️ สินค้าที่ถูกดูมาก — ยังไม่ถูกสั่งซื้อ</div>
        <div class="section-sub">ช่วยระบุสินค้าที่น่าสนใจแต่มีอุปสรรคในการซื้อ</div>
        ${interest_gap.length === 0 ?
            '<div style="color:var(--txt3);font-size:13px;padding:8px 0">ยังไม่มีข้อมูลการดูสินค้า</div>'
        :
        interest_gap.map(g => {
            const ratio = Number(g.order_cnt) > 0 ? Math.round(Number(g.view_cnt)/Number(g.order_cnt)) : 999;
            const gapLevel = ratio >= 10 || Number(g.order_cnt) === 0 ? 'hot' : ratio >= 3 ? 'warn' : 'ok';
            const gapLabel = { hot:'⚠️ ดูมาก ไม่ซื้อ', warn:'👀 อยู่ระหว่างตัดสินใจ', ok:'✅ ปกติ' }[gapLevel];
            return `<div class="gap-item">
                <div class="gap-name" title="${esc(g.product_name)}">${esc(g.product_name||'-')}</div>
                <div class="gap-views">👁 ${g.view_cnt} ครั้ง | 📦 ${g.order_cnt} ออเดอร์</div>
                <div class="gap-pill ${gapLevel}">${gapLabel}</div>
            </div>`;
        }).join('')}
        ${interest_gap.some(g => (Number(g.order_cnt)===0||Number(g.view_cnt)/Math.max(Number(g.order_cnt),1)>=5)) ? `
        <div class="insight-box" style="margin-top:16px">
            <div class="insight-icon">💡</div>
            <div class="insight-text"><strong>Insight:</strong> สินค้าที่ถูกดูมากแต่ไม่ซื้ออาจมีปัญหาเรื่อง ราคา / สต็อกหมด / ขาดข้อมูล — ลองโปรโมชันเฉพาะกลุ่ม หรือให้บอท push notification</div>
        </div>` : ''}
    </div>`;

    // ── 6. Engagement leaderboard ──
    const maxScore = engagement[0]?.score || 1;
    const lbHtml = `
    <div class="card card-mb">
        <div class="section-title">🏆 Engagement Score (${days} วันล่าสุด)</div>
        <div class="section-sub">คะแนน = Page view×1 + ดูสินค้า×3 + ตะกร้า×5 + Checkout×10</div>
        ${engagement.length === 0 ? '<div style="color:var(--txt3);font-size:13px">ยังไม่มีข้อมูล</div>' :
        engagement.map((u, i) => {
            const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
            const tierCol = { 'Bronze':'#cd7f32','Silver':'#94a3b8','Gold':'#f59e0b','Platinum':'#7c3aed','Diamond':'#3b82f6','-':'#64748b' };
            const col = tierCol[u.tier] || '#64748b';
            const pct = maxScore > 0 ? Math.round(Number(u.score)/maxScore*100) : 0;
            return `<div class="lb-row">
                <div class="lb-rank">${rankIcon}</div>
                <div class="lb-name">
                    <div class="lb-name-main">${esc(u.full_name||u.username)}</div>
                    <div class="lb-name-sub" style="color:${col}">${esc(u.tier||'-')} &nbsp;·&nbsp; ${u.last_active?timeAgo(u.last_active):'—'}</div>
                    <div style="margin-top:4px;background:var(--sur3);border-radius:4px;height:4px;width:100%;overflow:hidden">
                        <div style="height:100%;width:${pct}%;background:${col};border-radius:4px"></div>
                    </div>
                </div>
                <div class="lb-score">${Number(u.score).toLocaleString()}</div>
                <div class="lb-details" style="flex-direction:column;align-items:flex-end;gap:2px">
                    <div class="lb-ev">👁 ${u.pv||0} &nbsp; 🔍 ${u.prodv||0}</div>
                    <div class="lb-ev">🛒 ${u.cart||0} &nbsp; 💳 ${u.chk||0}</div>
                </div>
            </div>`;
        }).join('')}
    </div>`;

    // ── Summary insight banner ──
    const totalEvents = engagement.reduce((s, u) => s + (Number(u.pv)||0) + (Number(u.prodv)||0), 0);
    const highGap = interest_gap.filter(g => Number(g.order_cnt)===0 && Number(g.view_cnt)>=2).length;
    const peakLabel = peakHour?.cnt > 0 ? (peakHour.hour<12?peakHour.hour+'am':peakHour.hour===12?'12pm':(peakHour.hour-12)+'pm') : 'ไม่ระบุ';
    const insightBanner = (highGap > 0 || engagement.length > 0) ? `
    <div class="insight-box" style="margin-bottom:24px">
        <div class="insight-icon">🧠</div>
        <div class="insight-text">
            <strong>สรุปพฤติกรรม ${days} วันล่าสุด:</strong>
            ${engagement.length > 0 ? `มีตัวแทน <strong>${engagement.length} คน</strong> active · ` : ''}
            ${peakHour?.cnt > 0 ? `ช่วงเวลา peak คือ <strong>${peakLabel}</strong> · ` : ''}
            ${highGap > 0 ? `มีสินค้า <strong>${highGap} รายการ</strong> ที่ถูกดูแต่ยังไม่ถูกสั่ง` : ''}
        </div>
    </div>` : '';

    document.getElementById('pageRoot').innerHTML =
        insightBanner +
        `<div class="two-col">${hourHtml}${dowHtml}</div>` +
        `<div class="two-col">${sectionHtml}${tierHtml}</div>` +
        `<div class="two-col">${gapHtml}${lbHtml}</div>`;
}

// Boot
loadOverview();
</script>
</body>
</html>
