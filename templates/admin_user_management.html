<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin User Management</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>🔐 Admin User Management</h1>
                    <p>สร้างและจัดการผู้ใช้งานในระบบ</p>
                </div>
                <div style="text-align: right;">
                    <p style="margin-bottom: 8px;"><strong id="currentUser">Loading...</strong></p>
                    <button onclick="handleLogout()" class="btn-logout">ออกจากระบบ</button>
                </div>
            </div>
        </div>

        <div class="content-wrapper">
            <!-- ส่วนที่ 1: Form สร้างผู้ใช้ใหม่ -->
            <div class="card">
                <h2>➕ สร้างผู้ใช้ใหม่</h2>
                
                <div id="alertBox" class="alert"></div>

                <form id="createUserForm">
                    <div class="form-group">
                        <label for="fullName">Full Name <span style="color: red;">*</span></label>
                        <input type="text" id="fullName" name="fullName" required placeholder="ชื่อ-นามสกุล">
                    </div>

                    <div class="form-group">
                        <label for="username">Username (Email) <span style="color: red;">*</span></label>
                        <input type="email" id="username" name="username" required placeholder="user@example.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password <span style="color: red;">*</span></label>
                        <input type="password" id="password" name="password" required placeholder="รหัสผ่าน">
                    </div>

                    <div class="form-group">
                        <label for="role">Assign Role <span style="color: red;">*</span></label>
                        <select id="role" name="role" required>
                            <option value="">-- เลือกบทบาท --</option>
                        </select>
                    </div>

                    <div class="form-group hidden" id="resellerTierGroup">
                        <label for="resellerTier">Reseller Tier <span style="color: red;">*</span></label>
                        <select id="resellerTier" name="resellerTier">
                            <option value="">-- เลือก Tier --</option>
                        </select>
                    </div>

                    <button type="submit" class="btn">Create User</button>
                </form>
            </div>

            <!-- ส่วนที่ 2: List ผู้ใช้ที่มีอยู่ -->
            <div class="card">
                <h2>👥 รายชื่อผู้ใช้งาน (<span id="userCount">0</span>)</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="4" class="loading">กำลังโหลดข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
