<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้าสินค้า - Reseller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/global-alert.css">
    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .cart-item {
            display: flex;
            gap: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .cart-item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .cart-item-sku {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
        
        .cart-item-options {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }
        
        .cart-item-pricing {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .original-price {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
        
        .discounted-price {
            color: #22c55e;
            font-size: 16px;
            font-weight: 600;
        }
        
        .discount-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .cart-item-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .qty-display {
            min-width: 36px;
            text-align: center;
            color: #fff;
            font-weight: 500;
        }
        
        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            font-size: 12px;
        }
        
        .remove-btn:hover {
            text-decoration: underline;
        }
        
        .item-subtotal {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        
        .cart-summary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 24px;
            height: fit-content;
        }
        
        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .summary-row.total {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .summary-row .discount {
            color: #22c55e;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        
        .checkout-btn:hover {
            opacity: 0.9;
        }
        
        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .clear-cart-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .clear-cart-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .empty-cart svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.4;
        }
        
        .empty-cart h3 {
            color: #fff;
            margin-bottom: 12px;
        }
        
        .empty-cart a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .stock-warning {
            font-size: 11px;
            color: #ef4444;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%"><path d="M 0,68 L 18,68 L 24,78 L 32,14 L 40,86 L 48,68 L 56,68 L 63,50 L 71,68 L 78,42 L 86,68 L 100,68" stroke-width="7.35"/></svg>
                    <span>Reseller</span>
                </div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/reseller" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        <span>หน้าหลัก</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/catalog" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                        <span>สินค้า</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/cart" class="nav-link active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span>ตะกร้าสินค้า</span>
                        <span class="cart-count-badge" id="sidebarCartCount" style="display: none;">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/orders" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        <span>คำสั่งซื้อ</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h1>ตะกร้าสินค้า</h1>
                <div class="user-info">
                    <a href="/logout" class="btn-primary btn-gray">
                        ออกจากระบบ
                    </a>
                </div>
            </header>

            <div class="cart-layout" id="cartContent">
                <!-- Cart content will be loaded here -->
            </div>
        </main>
    </div>

    <script src="/static/js/global-alert.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        const API_URL = '/api';
        let cart = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
        });
        
        async function loadCart() {
            try {
                const response = await fetch(`${API_URL}/cart`);
                if (response.ok) {
                    cart = await response.json();
                    renderCart();
                    updateSidebarCount();
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        function formatPrice(price) {
            return '฿' + (price || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 });
        }
        
        function renderCart() {
            const container = document.getElementById('cartContent');
            
            if (!cart || cart.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart" style="grid-column: 1 / -1;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <h3>ตะกร้าว่างเปล่า</h3>
                        <p>เริ่มเลือกซื้อสินค้าได้เลย</p>
                        <a href="/reseller/catalog">เลือกซื้อสินค้า</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="cart-items">
                    ${cart.items.map(item => `
                        <div class="cart-item" data-id="${item.id}">
                            ${item.image_url 
                                ? `<img src="${item.image_url}" class="cart-item-image" alt="${item.product_name}">`
                                : `<div class="cart-item-image" style="display: flex; align-items: center; justify-content: center;">
                                    <svg viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%"><path d="M 0,68 L 18,68 L 24,78 L 32,14 L 40,86 L 48,68 L 56,68 L 63,50 L 71,68 L 78,42 L 86,68 L 100,68" stroke-width="7.35"/></svg>
                                   </div>`
                            }
                            <div class="cart-item-info">
                                <h4 class="cart-item-name">${item.product_name}</h4>
                                <p class="cart-item-sku">${item.sku_code}</p>
                                <div class="cart-item-pricing">
                                    ${item.tier_discount_percent > 0 ? `
                                        <span class="original-price">${formatPrice(item.unit_price)}</span>
                                        <span class="discounted-price">${formatPrice(item.discounted_price)}</span>
                                        <span class="discount-badge">-${item.tier_discount_percent}%</span>
                                    ` : `
                                        <span class="discounted-price">${formatPrice(item.unit_price)}</span>
                                    `}
                                </div>
                                ${item.stock < item.quantity ? `
                                    <p class="stock-warning">สต็อกเหลือ ${item.stock} ชิ้น</p>
                                ` : ''}
                            </div>
                            <div class="cart-item-actions">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                    <span class="qty-display">${item.quantity}</span>
                                    <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                </div>
                                <div class="item-subtotal">${formatPrice(item.subtotal)}</div>
                                <button class="remove-btn" onclick="removeItem(${item.id})">ลบ</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="cart-summary">
                    <h3 class="summary-title">สรุปคำสั่งซื้อ</h3>
                    <div class="summary-row">
                        <span>รายการทั้งหมด (${cart.total_quantity} ชิ้น)</span>
                        <span>${formatPrice(cart.total_amount)}</span>
                    </div>
                    ${cart.total_discount > 0 ? `
                        <div class="summary-row">
                            <span>ส่วนลดสมาชิก</span>
                            <span class="discount">-${formatPrice(cart.total_discount)}</span>
                        </div>
                    ` : ''}
                    <div class="summary-row total">
                        <span>รวมทั้งสิ้น</span>
                        <span>${formatPrice(cart.final_amount)}</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()" ${cart.items.length === 0 ? 'disabled' : ''}>
                        ดำเนินการสั่งซื้อ
                    </button>
                    <button class="clear-cart-btn" onclick="clearCart()">
                        ล้างตะกร้า
                    </button>
                </div>
            `;
        }
        
        function updateSidebarCount() {
            const badge = document.getElementById('sidebarCartCount');
            if (cart && cart.total_quantity > 0) {
                badge.style.display = 'inline';
                badge.textContent = cart.total_quantity;
            } else {
                badge.style.display = 'none';
            }
        }
        
        async function updateQuantity(itemId, newQuantity) {
            if (newQuantity < 1) {
                removeItem(itemId);
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/cart/items/${itemId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQuantity })
                });
                
                if (response.ok) {
                    loadCart();
                } else {
                    const error = await response.json();
                    showAlert(error.error || 'ไม่สามารถอัพเดทจำนวนได้', 'error');
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }
        
        async function removeItem(itemId) {
            if (!confirm('ต้องการลบสินค้านี้ออกจากตะกร้า?')) return;
            
            try {
                const response = await fetch(`${API_URL}/cart/items/${itemId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadCart();
                    showAlert('ลบสินค้าออกจากตะกร้าแล้ว', 'success');
                } else {
                    showAlert('ไม่สามารถลบสินค้าได้', 'error');
                }
            } catch (error) {
                console.error('Error removing item:', error);
            }
        }
        
        async function clearCart() {
            if (!confirm('ต้องการล้างตะกร้าทั้งหมด?')) return;
            
            try {
                const response = await fetch(`${API_URL}/cart/clear`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadCart();
                }
            } catch (error) {
                console.error('Error clearing cart:', error);
            }
        }
        
        function checkout() {
            window.location.href = '/reseller/checkout';
        }
    </script>
    <script src="/static/js/global-alert.js"></script>
</body>
</html>
