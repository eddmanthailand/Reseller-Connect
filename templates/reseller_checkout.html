<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - Reseller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            max-width: 1200px;
        }
        
        @media (max-width: 900px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .checkout-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .order-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .order-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .order-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .order-item-info {
            flex: 1;
        }
        
        .order-item-name {
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        
        .order-item-sku {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .order-item-qty {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .order-item-price {
            text-align: right;
        }
        
        .order-item-price .final {
            font-weight: 600;
            color: #fff;
        }
        
        .order-item-price .original {
            font-size: 12px;
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .qr-section {
            text-align: center;
            padding: 20px;
        }
        
        .qr-image {
            max-width: 200px;
            margin: 0 auto 16px;
            border-radius: 12px;
        }
        
        .account-info {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
        }
        
        .account-info strong {
            color: #fff;
        }
        
        .upload-slip-area {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .upload-slip-area:hover {
            border-color: rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.1);
        }
        
        .upload-slip-area img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
        }
        
        .upload-slip-area .placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .upload-slip-area .placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .summary-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 24px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .summary-row.total {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .summary-row .discount {
            color: #22c55e;
        }
        
        .confirm-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        
        .confirm-btn:hover {
            opacity: 0.9;
        }
        
        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .notes-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 10px;
            resize: vertical;
            min-height: 80px;
        }
        
        .notes-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
        }
        
        .step.active .step-number {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
        }
        
        .step.completed .step-number {
            background: #22c55e;
            color: white;
        }
        
        .step-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .step.active .step-label {
            color: #fff;
        }
        
        /* Order Created Success */
        .success-message {
            text-align: center;
            padding: 40px;
        }
        
        .success-message svg {
            width: 80px;
            height: 80px;
            color: #22c55e;
            margin-bottom: 20px;
        }
        
        .success-message h2 {
            color: #fff;
            margin-bottom: 12px;
        }
        
        .success-message p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }
        
        .order-number {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    <span>Reseller</span>
                </div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/reseller" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        <span>หน้าหลัก</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/catalog" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                        <span>สินค้า</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/cart" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span>ตะกร้าสินค้า</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/reseller/orders" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        <span>คำสั่งซื้อ</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h1>ชำระเงิน</h1>
                <div class="user-info">
                    <a href="/logout" class="btn-primary btn-gray">
                        ออกจากระบบ
                    </a>
                </div>
            </header>

            <div class="step-indicator">
                <div class="step" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">ตรวจสอบรายการ</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">ยืนยันคำสั่งซื้อ</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">แนบสลิป</div>
                </div>
            </div>

            <div id="checkoutContent">
                <!-- Content loaded via JS -->
            </div>
        </main>
    </div>

    <script src="/static/js/dashboard.js"></script>
    <script>
        const API_URL = '/api';
        let cart = null;
        let promptpaySettings = null;
        let currentStep = 1;
        let createdOrder = null;
        let slipImageUrl = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            loadPromptPay();
        });
        
        async function loadCart() {
            try {
                const response = await fetch(`${API_URL}/cart`);
                if (response.ok) {
                    cart = await response.json();
                    if (!cart.items || cart.items.length === 0) {
                        window.location.href = '/reseller/cart';
                        return;
                    }
                    updateStep(1);
                    renderStep1();
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        async function loadPromptPay() {
            try {
                const response = await fetch(`${API_URL}/promptpay-settings`);
                if (response.ok) {
                    promptpaySettings = await response.json();
                }
            } catch (error) {
                console.error('Error loading PromptPay:', error);
            }
        }
        
        function formatPrice(price) {
            return '฿' + (price || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 });
        }
        
        function updateStep(step) {
            currentStep = step;
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById(`step${i}`);
                el.classList.remove('active', 'completed');
                if (i < step) el.classList.add('completed');
                if (i === step) el.classList.add('active');
            }
        }
        
        function renderStep1() {
            const container = document.getElementById('checkoutContent');
            container.innerHTML = `
                <div class="checkout-layout">
                    <div>
                        <div class="checkout-section">
                            <h3 class="section-title">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                    <line x1="3" y1="6" x2="21" y2="6"/>
                                    <path d="M16 10a4 4 0 0 1-8 0"/>
                                </svg>
                                รายการสินค้า (${cart.item_count} รายการ)
                            </h3>
                            <div class="order-items">
                                ${cart.items.map(item => `
                                    <div class="order-item">
                                        ${item.image_url 
                                            ? `<img src="${item.image_url}" class="order-item-image" alt="${item.product_name}">`
                                            : `<div class="order-item-image" style="display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.3;">
                                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                                </svg>
                                               </div>`
                                        }
                                        <div class="order-item-info">
                                            <div class="order-item-name">${item.product_name}</div>
                                            <div class="order-item-sku">${item.sku_code}</div>
                                            <div class="order-item-qty">x ${item.quantity}</div>
                                        </div>
                                        <div class="order-item-price">
                                            ${item.tier_discount_percent > 0 ? `
                                                <div class="original">${formatPrice(item.unit_price * item.quantity)}</div>
                                            ` : ''}
                                            <div class="final">${formatPrice(item.subtotal)}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="checkout-section">
                            <h3 class="section-title">หมายเหตุ (ถ้ามี)</h3>
                            <textarea class="notes-input" id="orderNotes" placeholder="ระบุข้อความถึงผู้ขาย..."></textarea>
                        </div>
                    </div>
                    
                    <div class="summary-card">
                        <h3 class="section-title">สรุปคำสั่งซื้อ</h3>
                        <div class="summary-row">
                            <span>รวมสินค้า</span>
                            <span>${formatPrice(cart.total_amount)}</span>
                        </div>
                        ${cart.total_discount > 0 ? `
                            <div class="summary-row">
                                <span>ส่วนลดสมาชิก</span>
                                <span class="discount">-${formatPrice(cart.total_discount)}</span>
                            </div>
                        ` : ''}
                        <div class="summary-row total">
                            <span>รวมทั้งสิ้น</span>
                            <span>${formatPrice(cart.final_amount)}</span>
                        </div>
                        <button class="confirm-btn" onclick="createOrder()">
                            ยืนยันคำสั่งซื้อ
                        </button>
                        <p style="text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px;">
                            หลังยืนยัน กรุณาชำระเงินและแนบสลิป
                        </p>
                    </div>
                </div>
            `;
        }
        
        async function createOrder() {
            const notes = document.getElementById('orderNotes').value;
            
            try {
                const response = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notes })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    createdOrder = data.order;
                    updateStep(3);
                    renderStep3();
                } else {
                    const error = await response.json();
                    alert(error.error || 'ไม่สามารถสร้างคำสั่งซื้อได้');
                }
            } catch (error) {
                console.error('Error creating order:', error);
                alert('เกิดข้อผิดพลาด');
            }
        }
        
        function renderStep3() {
            const container = document.getElementById('checkoutContent');
            container.innerHTML = `
                <div class="checkout-layout" style="max-width: 800px; margin: 0 auto;">
                    <div style="grid-column: 1 / -1;">
                        <div class="checkout-section">
                            <div class="success-message">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 12 14.01 9 11.01"/>
                                </svg>
                                <h2>สร้างคำสั่งซื้อสำเร็จ!</h2>
                                <div class="order-number">${createdOrder.order_number}</div>
                                <p>กรุณาชำระเงินและแนบสลิปเพื่อดำเนินการต่อ</p>
                            </div>
                        </div>
                        
                        <div class="checkout-section">
                            <h3 class="section-title">ชำระเงินผ่าน PromptPay</h3>
                            <div class="qr-section">
                                ${promptpaySettings && promptpaySettings.qr_image_url 
                                    ? `<img src="${promptpaySettings.qr_image_url}" class="qr-image" alt="PromptPay QR">`
                                    : '<p style="color: rgba(255,255,255,0.5);">ไม่พบ QR Code</p>'
                                }
                                <div class="account-info">
                                    ${promptpaySettings && promptpaySettings.account_name 
                                        ? `<p>ชื่อบัญชี: <strong>${promptpaySettings.account_name}</strong></p>` : ''}
                                    ${promptpaySettings && promptpaySettings.account_number 
                                        ? `<p>เลขบัญชี: <strong>${promptpaySettings.account_number}</strong></p>` : ''}
                                    <p style="font-size: 24px; font-weight: 700; color: #22c55e; margin-top: 12px;">
                                        ${formatPrice(createdOrder.final_amount)}
                                    </p>
                                </div>
                                
                                <h4 style="color: #fff; margin-top: 24px; margin-bottom: 12px;">แนบสลิปการโอนเงิน</h4>
                                <div class="upload-slip-area" id="slipUploadArea" onclick="document.getElementById('slipInput').click()">
                                    <div class="placeholder" id="slipPlaceholder">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                            <circle cx="8.5" cy="8.5" r="1.5"/>
                                            <polyline points="21 15 16 10 5 21"/>
                                        </svg>
                                        <p>คลิกเพื่ออัปโหลดสลิป</p>
                                    </div>
                                    <img id="slipPreview" src="" alt="Slip Preview" style="display: none;">
                                </div>
                                <input type="file" id="slipInput" accept="image/*" style="display: none;">
                                
                                <button class="confirm-btn" id="submitSlipBtn" onclick="submitSlip()" disabled style="margin-top: 20px;">
                                    ส่งสลิปเพื่อตรวจสอบ
                                </button>
                                
                                <p style="text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px;">
                                    หรือ <a href="/reseller/orders" style="color: #a855f7;">ดูคำสั่งซื้อของคุณ</a> และแนบสลิปภายหลัง
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Setup slip upload
            document.getElementById('slipInput').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('slipPreview').src = e.target.result;
                    document.getElementById('slipPreview').style.display = 'block';
                    document.getElementById('slipPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
                
                // Upload
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        slipImageUrl = data.url;
                        document.getElementById('submitSlipBtn').disabled = false;
                    } else {
                        throw new Error('Upload failed');
                    }
                } catch (error) {
                    console.error('Error uploading slip:', error);
                    alert('ไม่สามารถอัปโหลดรูปภาพได้');
                }
            });
        }
        
        async function submitSlip() {
            if (!slipImageUrl) {
                alert('กรุณาอัปโหลดสลิปก่อน');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/orders/${createdOrder.id}/payment-slip`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        slip_image_url: slipImageUrl,
                        amount: createdOrder.final_amount
                    })
                });
                
                if (response.ok) {
                    alert('ส่งสลิปสำเร็จ! กรุณารอการตรวจสอบ');
                    window.location.href = '/reseller/orders';
                } else {
                    const error = await response.json();
                    alert(error.error || 'ไม่สามารถส่งสลิปได้');
                }
            } catch (error) {
                console.error('Error submitting slip:', error);
                alert('เกิดข้อผิดพลาด');
            }
        }
    </script>
</body>
</html>
