<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระดับตัวแทน</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/global-alert.css">
    <style>
        .tier-settings-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .tier-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tier-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .tier-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .tier-badge.bronze { background: linear-gradient(135deg, #cd7f32, #8b4513); color: white; }
        .tier-badge.silver { background: linear-gradient(135deg, #c0c0c0, #808080); color: white; }
        .tier-badge.gold { background: linear-gradient(135deg, #ffd700, #daa520); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .tier-badge.platinum { background: linear-gradient(135deg, #e5e4e2, #a0a0a0); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .tier-level {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        .tier-form-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 16px;
        }
        .tier-form-row label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        .tier-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            width: 100%;
        }
        .tier-input:focus {
            outline: none;
            border-color: rgba(147, 51, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1);
        }
        .tier-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .threshold-input-wrapper {
            position: relative;
        }
        .threshold-suffix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
        .btn-save-all {
            background: linear-gradient(135deg, #9333ea, #db2777);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-save-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
        }
        .btn-save-all:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .btn-check-upgrades {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-check-upgrades:hover {
            background: rgba(34, 197, 94, 0.3);
        }
        .resellers-section {
            margin-top: 40px;
        }
        .resellers-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .resellers-table th,
        .resellers-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .resellers-table th {
            background: rgba(147, 51, 234, 0.2);
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .resellers-table td {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .resellers-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .manual-badge {
            background: rgba(234, 179, 8, 0.3);
            color: white;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
            text-align: center;
            line-height: 1.3;
            max-width: 80px;
        }
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: block;
        }
        .alert.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        .upgrade-result {
            margin-top: 16px;
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .upgrade-result h4 {
            color: #22c55e;
            margin-bottom: 12px;
        }
        .upgrade-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }
        .upgrade-item:last-child {
            border-bottom: none;
        }
        .section-title {
            font-size: 20px;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item nav-link-external">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </span>
                    <span class="sidebar-text">หน้าหลัก</span>
                </a>
                <a href="/dashboard" class="nav-item nav-link-external">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>

                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            </svg>
                        </span>

                    <a href="/admin/categories" class="submenu-item">

                                <path d="M10 3H6a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Z"/>
                                <path d="M18 3h-4a2 2 0 0 0-2 2v4c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Z"/>
                                <path d="M18 13h-4a2 2 0 0 0-2 2v4c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2Z"/>
                            </svg>
                        </span>
                        <span class="sidebar-text">หมวดหมู่สินค้า</span>
                    </a>
                </div>
                <a href="/admin/tier-settings" class="nav-item active">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20v-6M6 20V10M18 20V4"/>

                    <span class="sidebar-text">ตั้งค่าระดับตัวแทน</span>

                <a href="#" class="nav-item" data-page="settings">

                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>

                    <span class="sidebar-text">ตั้งค่า</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="handleLogout()" class="btn-logout">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>

        <main class="main-content" style="display: block; flex: 1;">
            <div class="page-header">
                <h1>ตั้งค่าระดับตัวแทน</h1>
                <p>กำหนดยอดขายสะสมขั้นต่ำสำหรับแต่ละระดับ</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <div class="tier-settings-container">
                <div class="actions-bar">
                    <button type="button" class="btn-save-all" id="btnSaveAll" onclick="saveAllTiers()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        บันทึกทั้งหมด
                    </button>
                    <button type="button" class="btn-check-upgrades" onclick="checkAllUpgrades()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        ตรวจสอบและอัปเกรดระดับ
                    </button>
                </div>

                <div id="upgradeResult"></div>

                <div id="tiersContainer"></div>

                <div class="resellers-section">
                    <h3 class="section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        รายชื่อตัวแทนทั้งหมด
                    </h3>
                    <table class="resellers-table">
                        <thead>
                            <tr>
                                <th>ชื่อผู้ใช้</th>
                                <th>ชื่อเต็ม</th>
                                <th>ระดับปัจจุบัน</th>
                                <th>ยอดซื้อสะสม</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="resellersTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: rgba(255,255,255,0.5);">กำลังโหลด...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    <script>
        let tiers = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const container = document.querySelector('.dashboard-container');
            sidebar.classList.toggle('collapsed');
            container.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        function toggleSubmenu(id) {
            const submenu = document.getElementById(id);
            submenu.classList.toggle('open');
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = 'alert ' + type;
            setTimeout(() => {
                alertBox.className = 'alert';
            }, 5000);
        }

        function getTierClass(tierName) {
            const name = tierName.toLowerCase();
            if (name.includes('bronze')) return 'bronze';
            if (name.includes('silver')) return 'silver';
            if (name.includes('gold')) return 'gold';
            if (name.includes('platinum')) return 'platinum';
            return '';
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('th-TH', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        async function loadTiers() {
            try {
                const response = await fetch('/api/reseller-tiers');
                if (!response.ok) throw new Error('Failed to load tiers');
                
                tiers = await response.json();
                renderTiers();
            } catch (error) {
                console.error('Error loading tiers:', error);
                showAlert('เกิดข้อผิดพลาดในการโหลดข้อมูลระดับ', 'error');
            }
        }

        function renderTiers() {
            const container = document.getElementById('tiersContainer');
            container.innerHTML = tiers.map(tier => `
                <div class="tier-card" data-tier-id="${tier.id}">
                    <div class="tier-header">
                        <span class="tier-badge ${getTierClass(tier.name)}">${tier.name}</span>
                        <span class="tier-level">ระดับ ${tier.level_rank}</span>
                    </div>
                    <div class="tier-form-row">
                        <label>ยอดขายขั้นต่ำ (บาท)</label>
                        <div class="threshold-input-wrapper">
                            <input type="number" class="tier-input threshold-input" 
                                   data-tier-id="${tier.id}" 
                                   value="${tier.upgrade_threshold || 0}"
                                   min="0" step="1000"
                                   placeholder="0">
                            <span class="threshold-suffix">บาท</span>
                        </div>
                    </div>
                    <div class="tier-form-row">
                        <label>คำอธิบาย</label>
                        <input type="text" class="tier-input description-input" 
                               data-tier-id="${tier.id}" 
                               value="${tier.description || ''}"
                               placeholder="คำอธิบายระดับ">
                    </div>
                    <p class="info-text">
                        ${tier.level_rank === 1 ? 'ระดับเริ่มต้นสำหรับตัวแทนใหม่ทุกคน' : 
                          `ตัวแทนจะอัปเกรดเป็นระดับนี้เมื่อยอดซื้อสะสมถึง ${formatCurrency(tier.upgrade_threshold)} บาท`}
                    </p>
                </div>
            `).join('');
        }

        async function saveAllTiers() {
            const btn = document.getElementById('btnSaveAll');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...';

            try {
                const tiersData = tiers.map(tier => {
                    const thresholdInput = document.querySelector(`.threshold-input[data-tier-id="${tier.id}"]`);
                    const descriptionInput = document.querySelector(`.description-input[data-tier-id="${tier.id}"]`);
                    return {
                        id: tier.id,
                        upgrade_threshold: parseFloat(thresholdInput.value) || 0,
                        description: descriptionInput.value || ''
                    };
                });

                const response = await fetch('/api/reseller-tiers/bulk', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tiers: tiersData })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to save');
                }

                const result = await response.json();
                tiers = result.tiers;
                renderTiers();
                showAlert('บันทึกการตั้งค่าระดับเรียบร้อยแล้ว', 'success');
            } catch (error) {
                console.error('Error saving tiers:', error);
                showAlert('เกิดข้อผิดพลาด: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    บันทึกทั้งหมด
                `;
            }
        }

        async function checkAllUpgrades() {
            try {
                const response = await fetch('/api/users/check-tier-upgrades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to check upgrades');
                }

                const result = await response.json();
                
                const container = document.getElementById('upgradeResult');
                if (result.upgraded_users.length > 0) {
                    container.innerHTML = `
                        <div class="upgrade-result">
                            <h4>ผลการอัปเกรดระดับ</h4>
                            ${result.upgraded_users.map(u => `
                                <div class="upgrade-item">
                                    <strong>${u.username}</strong> - 
                                    ${u.old_tier || 'ไม่มีระดับ'} → 
                                    <span style="color: #22c55e;">${u.new_tier}</span>
                                    (ยอดสะสม: ${formatCurrency(u.total_purchases)} บาท)
                                </div>
                            `).join('')}
                        </div>
                    `;
                    showAlert(`อัปเกรดระดับสำเร็จ ${result.upgraded_users.length} คน`, 'success');
                } else {
                    container.innerHTML = '';
                    showAlert('ไม่มีตัวแทนที่ต้องอัปเกรดระดับ', 'success');
                }

                loadResellers();
            } catch (error) {
                console.error('Error checking upgrades:', error);
                showAlert('เกิดข้อผิดพลาด: ' + error.message, 'error');
            }
        }

        async function loadResellers() {
            try {
                const response = await fetch('/api/resellers');
                if (!response.ok) throw new Error('Failed to load resellers');
                
                const resellers = await response.json();
                const tbody = document.getElementById('resellersTableBody');
                
                if (resellers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: rgba(255,255,255,0.5);">ไม่มีข้อมูลตัวแทน</td></tr>';
                    return;
                }

                tbody.innerHTML = resellers.map(r => `
                    <tr>
                        <td>${r.username}</td>
                        <td>${r.full_name || '-'}</td>
                        <td>
                            <span class="tier-badge ${getTierClass(r.tier_name || '')}" style="font-size: 12px;">
                                ${r.tier_name || 'ไม่มีระดับ'}
                            </span>
                        </td>
                        <td>${formatCurrency(r.total_purchases)} บาท</td>
                        <td>
                            ${r.tier_manual_override ? '<span class="manual-badge">Manual<br>Override</span>' : 'อัตโนมัติ'}
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading resellers:', error);
            }
        }

        async function loadCurrentUser() {
            try {
                const response = await fetch('/api/me');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('currentUser').textContent = user.full_name || user.username;
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        async function handleLogout() {
            showConfirmAlert('คุณต้องการออกจากระบบหรือไม่?', async () => {
                try {
                    await fetch('/api/logout', { method: 'POST' });
                    showAlert('ออกจากระบบสำเร็จ', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } catch (error) {
                    console.error('Logout error:', error);
                    showAlert('เกิดข้อผิดพลาดในการออกจากระบบ', 'error');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (sidebarCollapsed) {
                document.getElementById('sidebar').classList.add('collapsed');
                document.querySelector('.dashboard-container').classList.add('sidebar-collapsed');
            }

            loadCurrentUser();
            loadTiers();
            loadResellers();
        });
    </script>
    <script src="/static/js/global-alert.js"></script>
</body>
</html>
