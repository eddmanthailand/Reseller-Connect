<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ผู้ช่วย Ads — EKG Shops</title>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=20260228">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            background: #f2f2f7;
            color: #1d1d1f;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Header ─── */
        .adv-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            height: 48px;
            background: rgba(242,242,247,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.12);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .adv-back {
            display: flex; align-items: center; gap: 4px;
            color: #007aff; font-size: 14px; font-weight: 500;
            text-decoration: none;
            padding: 4px 0;
            flex-shrink: 0;
        }
        .adv-back svg { flex-shrink: 0; }
        .adv-title {
            flex: 1; min-width: 0;
            font-size: 14px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .adv-title-sub { font-size: 11px; font-weight: 400; color: #6e6e73; }

        /* ─── Capture Bar ─── */
        .adv-capture-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #fff;
            border-bottom: 0.5px solid #e5e5ea;
            flex-wrap: wrap;
        }
        .adv-status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #c7c7cc;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .adv-status-dot.live { background: #34c759; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; } 50% { opacity: 0.5; }
        }
        .adv-status-label { font-size: 12px; color: #6e6e73; }
        .adv-status-label.live { color: #1d1d1f; font-weight: 500; }
        .adv-capture-btn {
            padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            border: none; cursor: pointer; transition: opacity 0.15s;
        }
        .adv-capture-btn:hover { opacity: 0.82; }
        .adv-btn-start { background: #34c759; color: #fff; }
        .adv-btn-stop  { background: #ff3b30; color: #fff; }
        .adv-interval-sel {
            padding: 4px 8px; border-radius: 7px; border: 0.5px solid #c7c7cc;
            font-size: 12px; background: #f2f2f7; color: #1d1d1f;
        }
        .adv-last-check {
            margin-left: auto;
            font-size: 11px; color: #8e8e93;
            white-space: nowrap;
        }
        .adv-preview-wrap {
            width: 100%;
            display: none;
        }
        .adv-preview-wrap.show { display: block; }
        #advPreviewVideo {
            width: 100%; max-height: 120px;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
            margin-top: 6px;
        }

        /* ─── Brief bar ─── */
        .adv-brief-bar {
            flex-shrink: 0;
            display: none;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 6px 14px;
            background: #f0f4ff;
            border-bottom: 0.5px solid #dce6ff;
            font-size: 11px;
        }
        .adv-brief-bar.show { display: flex; }
        .adv-brief-chip {
            background: #fff; border: 0.5px solid #c7c7cc;
            border-radius: 6px; padding: 2px 7px; font-size: 11px; color: #1d1d1f;
        }
        .adv-brief-label { font-size: 11px; color: #4a4a8a; font-weight: 600; }

        /* ─── Messages ─── */
        #advMessages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .adv-msg {
            max-width: 86%;
            padding: 9px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .adv-msg.user {
            align-self: flex-end;
            background: #007aff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .adv-msg.ai {
            align-self: flex-start;
            background: #fff;
            color: #1d1d1f;
            border: 0.5px solid #e5e5ea;
            border-bottom-left-radius: 4px;
        }
        .adv-msg.ai.auto-flag {
            border-color: #ff9500;
            background: #fffbf0;
        }
        .adv-msg-badge {
            display: inline-block;
            font-size: 10px; font-weight: 700;
            padding: 1px 5px; border-radius: 4px;
            background: #ff950022; color: #c75a00;
            margin-bottom: 4px;
        }
        .adv-msg.thinking {
            align-self: flex-start;
            background: #f2f2f7;
            color: #6e6e73;
            font-size: 12px;
        }
        .adv-welcome {
            align-self: flex-start;
            background: #f0f4ff;
            border: 0.5px solid #c0cdff;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            padding: 10px 13px;
            font-size: 13px;
            line-height: 1.6;
            color: #1d1d1f;
            max-width: 90%;
        }

        /* ─── Input Bar ─── */
        .adv-input-bar {
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px;
            background: #fff;
            border-top: 0.5px solid #e5e5ea;
        }
        #advInput {
            flex: 1;
            resize: none;
            border: 0.5px solid #c7c7cc;
            border-radius: 12px;
            padding: 9px 12px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            background: #f9f9f9;
            color: #1d1d1f;
        }
        #advInput:focus { outline: none; border-color: #007aff; background: #fff; }
        #advInput::placeholder { color: #c7c7cc; }
        .adv-snap-btn {
            flex-shrink: 0;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none; cursor: pointer;
            background: #f2f2f7;
            display: flex; align-items: center; justify-content: center;
            color: #3d3d3d;
            transition: opacity 0.15s;
        }
        .adv-snap-btn:hover { opacity: 0.75; }
        .adv-send-btn {
            flex-shrink: 0;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none; cursor: pointer;
            background: #007aff;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            transition: opacity 0.15s;
        }
        .adv-send-btn:hover { opacity: 0.82; }
        .adv-send-btn:disabled { background: #c7c7cc; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- Header -->
<div class="adv-header">
    <a class="adv-back" href="/admin/facebook-ads" target="_self">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7L7 13" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        กลับ
    </a>
    <div class="adv-title">
        <span id="advCampName">AI ผู้ช่วย Ads</span>
        <div class="adv-title-sub" id="advCampId">Campaign ID: {{ campaign_id }}</div>
    </div>
</div>

<!-- Capture Bar -->
<div class="adv-capture-bar">
    <div class="adv-status-dot" id="advDot"></div>
    <span class="adv-status-label" id="advStatusLabel">ยังไม่ได้เปิดดูหน้าจอ</span>
    <button class="adv-capture-btn adv-btn-start" id="advStartBtn" onclick="startCapture()">📷 เปิดดูหน้าจอ</button>
    <button class="adv-capture-btn adv-btn-stop" id="advStopBtn" style="display:none;" onclick="stopCapture()">⏹ หยุดดู</button>
    <select class="adv-interval-sel" id="advIntervalSel" onchange="changeInterval()">
        <option value="10">ทุก 10 วิ</option>
        <option value="15" selected>ทุก 15 วิ</option>
        <option value="30">ทุก 30 วิ</option>
        <option value="60">ทุก 60 วิ</option>
    </select>
    <span class="adv-last-check" id="advLastCheck"></span>
    <div class="adv-preview-wrap" id="advPreviewWrap">
        <video id="advPreviewVideo" autoplay muted playsinline></video>
    </div>
</div>

<!-- Brief bar -->
<div class="adv-brief-bar" id="advBriefBar"></div>

<!-- Messages -->
<div id="advMessages">
    <div class="adv-welcome" id="advWelcome">
        👋 สวัสดีครับ พร้อมช่วยวิเคราะห์แคมเปญแล้ว<br><br>
        <strong>เปิดดูหน้าจอ</strong> เพื่อให้ AI มองเห็น Facebook Ads Manager ของคุณแบบอัตโนมัติ<br>
        หรือ <strong>พิมพ์คำถาม</strong> เพื่อถามโดยตรงได้เลยครับ
    </div>
</div>

<!-- Hidden canvas for frame capture -->
<canvas id="advCanvas" style="display:none;"></canvas>
<!-- Hidden video source -->
<video id="advSourceVideo" style="display:none;" autoplay muted playsinline></video>

<!-- Input Bar -->
<div class="adv-input-bar">
    <button class="adv-snap-btn" onclick="sendWithSnapshot()" title="ถ่ายภาพหน้าจอและถาม">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <textarea id="advInput" rows="1" placeholder="พิมพ์คำถาม... (Enter ส่ง, Shift+Enter ขึ้นบรรทัดใหม่)"
        onkeydown="advInputKeydown(event)" oninput="advAutoResize(this)"></textarea>
    <button class="adv-send-btn" id="advSendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
</div>

<script>
const CAMPAIGN_ID = {{ campaign_id | tojson }};

let captureStream   = null;
let autoTimer       = null;
let chatHistory     = [];   // [{role:'user'|'model', text:'...'}]
let campaignCtx     = {};   // brief + metrics loaded from API
let isRequesting    = false;

// ─── Init ────────────────────────────────────────────────────────

async function initAdvisor() {
    try {
        const r = await fetch(`/api/facebook-ads/campaign-brief/${CAMPAIGN_ID}`, { credentials: 'include' });
        const d = await r.json();
        if (d.found) {
            campaignCtx = {
                campaign_name:    d.campaign_name || '',
                goal_type:        d.goal_type,
                target_cpl:       d.target_cpl,
                target_ctr:       d.target_ctr,
                max_daily_budget: d.max_daily_budget,
                audience_note:    d.audience_note,
            };
            if (d.campaign_name) {
                document.getElementById('advCampName').textContent = '🤖 AI ผู้ช่วย — ' + d.campaign_name;
            }
            _renderBrief(d);
        }
    } catch(e) { /* silent */ }
}

function _renderBrief(b) {
    const bar = document.getElementById('advBriefBar');
    if (!b || !b.found) return;
    const goalMap = { lead:'Lead/สมัคร', registration:'Registration', awareness:'Awareness', purchase:'ยอดขาย' };
    let html = `<span class="adv-brief-label">🎯 เป้าหมาย:</span>`;
    html += `<span class="adv-brief-chip">${goalMap[b.goal_type] || b.goal_type || 'Lead'}</span>`;
    if (b.target_cpl)       html += `<span class="adv-brief-chip">CPL ≤ ฿${b.target_cpl}</span>`;
    if (b.target_ctr)       html += `<span class="adv-brief-chip">CTR ≥ ${b.target_ctr}%</span>`;
    if (b.max_daily_budget) html += `<span class="adv-brief-chip">งบ/วัน ≤ ฿${b.max_daily_budget}</span>`;
    if (b.audience_note)    html += `<span class="adv-brief-chip" style="color:#555;">${b.audience_note}</span>`;
    bar.innerHTML = html;
    bar.classList.add('show');
}

// ─── Screen Capture ──────────────────────────────────────────────

async function startCapture() {
    try {
        captureStream = await navigator.mediaDevices.getDisplayMedia({
            video: { frameRate: { ideal: 2, max: 5 } },
            audio: false
        });
        const srcVid = document.getElementById('advSourceVideo');
        const prvVid = document.getElementById('advPreviewVideo');
        srcVid.srcObject = captureStream;
        prvVid.srcObject = captureStream;

        captureStream.getVideoTracks()[0].addEventListener('ended', stopCapture);

        document.getElementById('advDot').classList.add('live');
        document.getElementById('advStatusLabel').textContent = 'กำลังดูหน้าจออยู่';
        document.getElementById('advStatusLabel').classList.add('live');
        document.getElementById('advStartBtn').style.display = 'none';
        document.getElementById('advStopBtn').style.display = '';
        document.getElementById('advPreviewWrap').classList.add('show');

        startAutoInterval();
        appendMsg('ai', '✅ เริ่มดูหน้าจอแล้วครับ จะแจ้งเตือนเมื่อพบสิ่งที่น่าสังเกต');
    } catch(e) {
        if (e.name !== 'NotAllowedError') {
            appendMsg('ai', '❌ ไม่สามารถเปิดดูหน้าจอได้: ' + e.message);
        }
    }
}

function stopCapture() {
    if (captureStream) {
        captureStream.getTracks().forEach(t => t.stop());
        captureStream = null;
    }
    clearInterval(autoTimer); autoTimer = null;

    document.getElementById('advSourceVideo').srcObject = null;
    document.getElementById('advPreviewVideo').srcObject = null;
    document.getElementById('advDot').classList.remove('live');
    document.getElementById('advStatusLabel').textContent = 'หยุดดูหน้าจอแล้ว';
    document.getElementById('advStatusLabel').classList.remove('live');
    document.getElementById('advStartBtn').style.display = '';
    document.getElementById('advStopBtn').style.display = 'none';
    document.getElementById('advPreviewWrap').classList.remove('show');
}

function startAutoInterval() {
    clearInterval(autoTimer);
    const secs = parseInt(document.getElementById('advIntervalSel').value || '15', 10);
    autoTimer = setInterval(autoCapture, secs * 1000);
}

function changeInterval() {
    if (captureStream) startAutoInterval();
}

function captureFrame() {
    const vid = document.getElementById('advSourceVideo');
    if (!vid.videoWidth) return null;
    const canvas = document.getElementById('advCanvas');
    let w = vid.videoWidth, h = vid.videoHeight;
    const maxW = 1280, maxH = 720;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(vid, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.65).split(',')[1];
}

async function autoCapture() {
    if (isRequesting || !captureStream) return;
    const screenshot = captureFrame();
    if (!screenshot) return;
    await callAdvisor('', screenshot, true);
}

// ─── Chat ────────────────────────────────────────────────────────

async function sendMessage() {
    const input = document.getElementById('advInput');
    const text = input.value.trim();
    if (!text || isRequesting) return;
    input.value = '';
    advAutoResize(input);
    appendMsg('user', text);
    chatHistory.push({ role: 'user', text });
    await callAdvisor(text, null, false);
}

async function sendWithSnapshot() {
    if (isRequesting) return;
    const screenshot = captureFrame();
    const input = document.getElementById('advInput');
    const text = input.value.trim() || 'ดูภาพหน้าจอนี้และวิเคราะห์สิ่งที่เห็น';
    input.value = '';
    advAutoResize(input);
    appendMsg('user', text + (screenshot ? ' 📷' : ''));
    chatHistory.push({ role: 'user', text });
    await callAdvisor(text, screenshot, false);
}

async function callAdvisor(message, screenshot, isAuto) {
    isRequesting = true;
    const btn = document.getElementById('advSendBtn');
    btn.disabled = true;

    let thinkingEl = null;
    if (!isAuto) {
        thinkingEl = appendMsg('ai', '⏳ กำลังคิด...', 'thinking');
    }

    try {
        const body = {
            campaign_id:      CAMPAIGN_ID,
            message:          message,
            screenshot:       screenshot || undefined,
            history:          chatHistory.slice(-10),
            is_auto:          isAuto,
            campaign_context: campaignCtx,
        };
        const r = await fetch('/api/facebook-ads/advisor-chat', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'เกิดข้อผิดพลาด');

        if (thinkingEl) thinkingEl.remove();

        const reply = d.reply || '';
        if (isAuto) {
            if (!d.is_trivial && reply) {
                const el = appendMsg('ai', reply, 'auto-flag');
                el.insertAdjacentHTML('afterbegin', '<div class="adv-msg-badge">🔄 auto</div>');
                chatHistory.push({ role: 'model', text: reply });
                document.getElementById('advLastCheck').textContent = '⚠️ แจ้งเตือน ' + _timeNow();
            } else {
                document.getElementById('advLastCheck').textContent = '✓ ตรวจสอบแล้ว ' + _timeNow();
            }
        } else {
            appendMsg('ai', reply);
            chatHistory.push({ role: 'model', text: reply });
        }
    } catch(e) {
        if (thinkingEl) thinkingEl.remove();
        if (!isAuto) appendMsg('ai', '❌ ' + e.message);
    } finally {
        isRequesting = false;
        btn.disabled = false;
    }
}

// ─── UI Helpers ──────────────────────────────────────────────────

function appendMsg(role, text, extraClass = '') {
    const wrap = document.getElementById('advMessages');
    const el = document.createElement('div');
    el.className = `adv-msg ${role}${extraClass ? ' ' + extraClass : ''}`;
    el.textContent = text;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
    return el;
}

function _timeNow() {
    return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function advInputKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function advAutoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── Boot ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', initAdvisor);
</script>
</body>
</html>
