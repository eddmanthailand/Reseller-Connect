<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำสั่งซื้อของฉัน - Reseller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/global-alert.css">
    <style>
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .status-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .status-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .status-tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .status-tab.active {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
        }
        
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .order-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-number {
            font-weight: 600;
            color: #fff;
        }
        
        .order-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .order-status.pending_payment {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .order-status.under_review {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        
        .order-status.paid {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .order-status.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .order-status.cancelled {
            background: rgba(107, 114, 128, 0.2);
            color: #6b7280;
        }
        
        .order-body {
            padding: 16px 20px;
        }
        
        .order-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        
        .order-total {
            text-align: right;
        }
        
        .order-total .amount {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        
        .order-total .discount {
            font-size: 12px;
            color: #22c55e;
        }
        
        .order-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-actions button {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-view {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-view:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-pay {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
        }
        
        .btn-pay:hover {
            opacity: 0.9;
        }
        
        .empty-orders {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .empty-orders svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.4;
        }
        
        .empty-orders h3 {
            color: #fff;
            margin-bottom: 12px;
        }
        
        /* Order Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(59, 130, 246, 0.2));
            backdrop-filter: blur(20px);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-section h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .detail-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .detail-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .detail-item-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .detail-item-info {
            flex: 1;
        }
        
        .detail-item-name {
            font-weight: 500;
            color: #fff;
            font-size: 14px;
        }
        
        .detail-item-sku {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .detail-item-price {
            text-align: right;
            color: #fff;
            font-weight: 500;
        }
        
        .slip-preview {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 8px;
        }
        
        .slip-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .slip-status.pending {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .slip-status.approved {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .slip-status.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .upload-slip-area {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }
        
        .upload-slip-area:hover {
            border-color: rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
<body>

                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>

        <main class="main-content">

                <button class="menu-toggle" id="menuToggle">

    <!-- Order Detail Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalOrderNumber">รายละเอียดคำสั่งซื้อ</h2>
                <button class="close-btn" onclick="closeModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Order detail loaded here -->
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
    <script>
        const API_URL = '/api';
        let orders = [];
        let currentOrder = null;
        let slipImageUrl = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            setupTabs();
        });
        
        function setupTabs() {
            document.querySelectorAll('.status-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    loadOrders(this.dataset.status);
                });
            });
        }
        
        async function loadOrders(status = '') {
            try {
                let url = `${API_URL}/orders`;
                if (status) url += `?status=${status}`;
                
                const response = await fetch(url);
                if (response.ok) {
                    orders = await response.json();
                    renderOrders();
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        
        function formatPrice(price) {
            return '฿' + (price || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 });
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('th-TH', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function getStatusText(status) {
            const texts = {
                'pending_payment': 'รอชำระเงิน',
                'under_review': 'รอตรวจสอบ',
                'paid': 'ชำระแล้ว',
                'rejected': 'ถูกปฏิเสธ',
                'cancelled': 'ยกเลิก'
            };
            return texts[status] || status;
        }
        
        function renderOrders() {
            const container = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <h3>ไม่มีคำสั่งซื้อ</h3>
                        <p>เริ่มสั่งซื้อสินค้าได้เลย</p>
                        <a href="/reseller/catalog" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: linear-gradient(135deg, #a855f7, #ec4899); color: white; text-decoration: none; border-radius: 10px; font-weight: 600;">
                            เลือกซื้อสินค้า
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-number">${order.order_number}</div>
                            <div class="order-date">${formatDate(order.created_at)}</div>
                        </div>
                        <span class="order-status ${order.status}">${getStatusText(order.status)}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-summary">
                            <div class="order-info">
                                ${order.item_count} รายการ
                            </div>
                            <div class="order-total">
                                ${order.discount_amount > 0 ? `
                                    <div class="discount">ส่วนลด ${formatPrice(order.discount_amount)}</div>
                                ` : ''}
                                <div class="amount">${formatPrice(order.final_amount)}</div>
                            </div>
                        </div>
                        <div class="order-actions">
                            <button class="btn-view" onclick="viewOrder(${order.id})">ดูรายละเอียด</button>
                            ${order.status === 'pending_payment' || order.status === 'rejected' ? `
                                <button class="btn-pay" onclick="viewOrder(${order.id})">แนบสลิป</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function viewOrder(orderId) {
            try {
                const response = await fetch(`${API_URL}/orders/${orderId}`);
                if (response.ok) {
                    currentOrder = await response.json();
                    slipImageUrl = null;
                    renderOrderModal();
                    document.getElementById('orderModal').classList.add('active');
                }
            } catch (error) {
                console.error('Error loading order:', error);
            }
        }
        
        function renderOrderModal() {
            document.getElementById('modalOrderNumber').textContent = currentOrder.order_number;
            
            const canUploadSlip = currentOrder.status === 'pending_payment' || currentOrder.status === 'rejected';
            
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <h4>สถานะ</h4>
                    <span class="order-status ${currentOrder.status}">${getStatusText(currentOrder.status)}</span>
                </div>
                
                <div class="detail-section">
                    <h4>รายการสินค้า</h4>
                    <div class="detail-items">
                        ${currentOrder.items.map(item => `
                            <div class="detail-item">
                                ${item.image_url 
                                    ? `<img src="${item.image_url}" class="detail-item-image" alt="${item.product_name}">`
                                    : `<div class="detail-item-image" style="display: flex; align-items: center; justify-content: center;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.3;">
                                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        </svg>
                                       </div>`
                                }
                                <div class="detail-item-info">
                                    <div class="detail-item-name">${item.product_name}</div>
                                    <div class="detail-item-sku">${item.sku_code} x ${item.quantity}</div>
                                </div>
                                <div class="detail-item-price">
                                    ${formatPrice(item.final_price * item.quantity)}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="detail-section" style="display: flex; justify-content: space-between; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <div>รวมทั้งสิ้น</div>
                    <div style="font-size: 20px; font-weight: 700; color: #fff;">${formatPrice(currentOrder.final_amount)}</div>
                </div>
                
                ${currentOrder.payment_slips && currentOrder.payment_slips.length > 0 ? `
                    <div class="detail-section">
                        <h4>สลิปการชำระเงิน</h4>
                        ${currentOrder.payment_slips.map(slip => `
                            <div style="margin-bottom: 12px;">
                                <span class="slip-status ${slip.status}">${getStatusText(slip.status)}</span>
                                ${slip.admin_notes ? `<p style="color: #ef4444; font-size: 12px; margin-top: 8px;">${slip.admin_notes}</p>` : ''}
                                <img src="${slip.slip_image_url}" class="slip-preview" alt="Slip">
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${canUploadSlip ? `
                    <div class="detail-section">
                        <h4>แนบสลิปการโอนเงิน</h4>
                        <div class="upload-slip-area" onclick="document.getElementById('slipInput').click()">
                            <div id="slipPlaceholder">
                                <p style="color: rgba(255,255,255,0.6);">คลิกเพื่ออัปโหลดสลิป</p>
                            </div>
                            <img id="slipPreview" src="" style="display: none; max-width: 150px; border-radius: 8px;">
                        </div>
                        <input type="file" id="slipInput" accept="image/*" style="display: none;">
                        <button class="btn-pay" id="submitSlipBtn" onclick="submitSlip()" disabled style="width: 100%; margin-top: 12px;">
                            ส่งสลิป
                        </button>
                    </div>
                ` : ''}
            `;
            
            if (canUploadSlip) {
                document.getElementById('slipInput').addEventListener('change', handleSlipUpload);
            }
        }
        
        async function handleSlipUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('slipPreview').src = e.target.result;
                document.getElementById('slipPreview').style.display = 'block';
                document.getElementById('slipPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    slipImageUrl = data.url;
                    document.getElementById('submitSlipBtn').disabled = false;
                } else {
                    throw new Error('Upload failed');
                }
            } catch (error) {
                console.error('Error uploading slip:', error);
                showAlert('ไม่สามารถอัปโหลดรูปภาพได้', 'error');
            }
        }
        
        async function submitSlip() {
            if (!slipImageUrl) return;
            
            try {
                const response = await fetch(`${API_URL}/orders/${currentOrder.id}/payment-slip`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        slip_image_url: slipImageUrl,
                        amount: currentOrder.final_amount
                    })
                });
                
                if (response.ok) {
                    showAlert('ส่งสลิปสำเร็จ! กรุณารอการตรวจสอบ', 'success');
                    closeModal();
                    loadOrders();
                } else {
                    const error = await response.json();
                    showAlert(error.error || 'ไม่สามารถส่งสลิปได้', 'error');
                }
            } catch (error) {
                console.error('Error submitting slip:', error);
                showAlert('เกิดข้อผิดพลาด', 'error');
            }
        }
        
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            currentOrder = null;
        }
        
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
    <script src="/static/js/global-alert.js"></script>
</body>
</html>
