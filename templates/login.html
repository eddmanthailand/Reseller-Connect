<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบสมาชิก</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global-alert.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }
        body::before {
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.1);
            top: -100px; right: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: rgba(255,255,255,0.08);
            bottom: -80px; left: -80px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .login-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 50px 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-wrapper svg { color: white; }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255,255,255,0.75);
            font-size: 15px;
        }

        /* Google Button */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            background: white;
            color: #1f1f1f;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 16px;
        }

        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: #f8f8f8;
        }

        .btn-google:active { transform: translateY(0); }

        .google-icon {
            width: 22px; height: 22px;
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .divider span {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            white-space: nowrap;
        }

        /* Admin toggle */
        .admin-toggle {
            text-align: center;
            margin-bottom: 16px;
        }

        .admin-toggle-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .admin-toggle-btn:hover {
            border-color: rgba(255,255,255,0.4);
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.05);
        }

        /* Admin form */
        .admin-form {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .admin-form.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder { color: rgba(255,255,255,0.4); }

        .input-wrapper input:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.15));
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.35), rgba(255,255,255,0.25));
            transform: translateY(-1px);
        }

        .forgot-link {
            text-align: center;
            margin-top: 12px;
        }

        .forgot-link a {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-decoration: none;
        }

        .forgot-link a:hover { color: rgba(255,255,255,0.9); }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-top: 30px;
        }

        /* Error message */
        .error-banner {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-container { padding: 40px 28px; border-radius: 20px; }
            .login-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-wrapper">
                <svg viewBox="0 0 280 90" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:40px;height:auto"><path d="M 0,62 L 72,62 L 82,68 L 93,45 L 106,74 L 118,62 L 138,62 C 148,62 152,54 165,54 C 178,54 182,62 192,62 L 280,62" stroke-width="14"/></svg>
            </div>
            <h1>เข้าสู่ระบบ</h1>
            <p>ระบบสมาชิก EKG Shops</p>
        </div>

        <div id="errorBanner" class="error-banner" style="display:none;"></div>

        <a href="/auth/google" class="btn-google">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            เข้าสู่ระบบด้วย Google
        </a>

        <p style="text-align:center; color:rgba(255,255,255,0.65); font-size:13px; line-height:1.6; margin-bottom:4px;">
            หากยังไม่มีบัญชี ระบบจะสร้างให้อัตโนมัติ<br>เมื่อ Login ด้วย Google ครั้งแรก
        </p>

        <div class="divider"><span>สำหรับ Admin เท่านั้น</span></div>

        <div class="admin-toggle">
            <button class="admin-toggle-btn" onclick="toggleAdminForm()">
                🔐 เข้าสู่ระบบด้วย Username/Password
            </button>
        </div>

        <div class="admin-form" id="adminForm">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username หรือ Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" placeholder="ชื่อผู้ใช้หรืออีเมล" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="รหัสผ่าน" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
                <div class="forgot-link">
                    <a href="#" onclick="showForgotPassword()">ลืมรหัสผ่าน?</a>
                </div>
            </form>
        </div>

        <div class="footer-text">© 2025 EKG Shops - ระบบสมาชิก</div>
    </div>

    <script src="/static/js/global-alert.js"></script>
    <script>
        // Show error from URL params
        const params = new URLSearchParams(window.location.search);
        const errorMap = {
            'google_failed': 'ไม่สามารถเชื่อมต่อ Google ได้ กรุณาลองใหม่',
            'no_email': 'ไม่พบ Email จาก Google กรุณาลองใหม่',
            'no_role': 'เกิดข้อผิดพลาดในระบบ กรุณาติดต่อ Admin',
            'oauth_failed': 'เกิดข้อผิดพลาดในการเข้าสู่ระบบ กรุณาลองใหม่'
        };
        const err = params.get('error');
        if (err && errorMap[err]) {
            const banner = document.getElementById('errorBanner');
            banner.textContent = errorMap[err];
            banner.style.display = 'block';
        }

        function toggleAdminForm() {
            const form = document.getElementById('adminForm');
            form.classList.toggle('show');
        }

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = loginForm.querySelector('button[type="submit"]');
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'เกิดข้อผิดพลาด');
                showAlert('เข้าสู่ระบบสำเร็จ!', 'success');
                setTimeout(() => { window.location.href = result.redirect || '/dashboard'; }, 800);
            } catch (error) {
                showAlert(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        });

        async function showForgotPassword() {
            const email = prompt('กรุณากรอกอีเมลที่ใช้ลงทะเบียน:');
            if (!email) return;
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                if (response.ok) showAlert(result.message, 'success');
                else showAlert(result.error || 'เกิดข้อผิดพลาด', 'error');
            } catch {
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            }
        }
    </script>
</body>
</html>
