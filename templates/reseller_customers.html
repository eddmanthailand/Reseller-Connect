<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลูกค้าของฉัน - Reseller Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        :root {
            --primary: #a855f7;
            --primary-dark: #9333ea;
            --secondary: #ec4899;
            --bg-dark: #0f0a1a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0a2e 50%, #0f0a1a 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(15, 10, 26, 0.95);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--card-border);
            text-align: center;
        }

        .sidebar-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .sidebar-logo { overflow: hidden; }
        .sidebar-logo svg {
            width: 90px; height: auto;
            color: white; stroke: white;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .nav-menu {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
            color: var(--text);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--card-border);
        }

        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-logout svg {
            width: 18px;
            height: 18px;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }

        .customer-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
        }

        .customer-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .customer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .customer-name {
            font-size: 18px;
            font-weight: 600;
        }

        .customer-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
        }

        .customer-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .info-row svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a2e, #0f0a1a);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid var(--card-border);
        }

        .btn-secondary {
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .customers-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 280 90" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:40px;height:auto"><path d="M 0,60 L 52,60 L 65,70 L 74,11 L 83,76 L 94,60 L 106,60 L 114,44 L 123,60 L 131,38 L 141,60 L 280,60" stroke-width="14"/></svg>
                </div>
                <div class="sidebar-title">Reseller Portal</div>
                <div class="sidebar-subtitle">ระบบสมาชิก</div>
            </div>

            <nav class="nav-menu">
                <a href="/reseller/dashboard" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    หน้าหลัก
                </a>
                <a href="/reseller/catalog" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path></svg>
                    สินค้าทั้งหมด
                </a>
                <a href="/reseller/cart" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    ตะกร้าสินค้า
                </a>
                <a href="/reseller/orders" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    ประวัติคำสั่งซื้อ
                </a>
                <a href="/reseller/customers" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    ลูกค้าของฉัน
                </a>
                <a href="/reseller/profile" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    ข้อมูลของฉัน
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="handleLogout()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
                    ออกจากระบบ
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">ลูกค้าของฉัน</h1>
                    <p class="page-subtitle">จัดการข้อมูลลูกค้าสำหรับส่งสินค้า</p>
                </div>
                <button class="btn-primary" onclick="openAddCustomerModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    เพิ่มลูกค้า
                </button>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาชื่อ, เบอร์โทร, อีเมล..." oninput="searchCustomers()">
            </div>

            <div class="customers-grid" id="customersGrid">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    <h3>ยังไม่มีข้อมูลลูกค้า</h3>
                    <p>คลิก "เพิ่มลูกค้า" เพื่อเริ่มต้น</p>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">เพิ่มลูกค้าใหม่</h2>
                <button class="modal-close" onclick="closeCustomerModal()">&times;</button>
            </div>
            <form id="customerForm" onsubmit="handleSaveCustomer(event)">
                <div class="modal-body">
                    <input type="hidden" id="customerId">
                    
                    <div class="form-group">
                        <label>ชื่อลูกค้า *</label>
                        <input type="text" id="customerName" required placeholder="ชื่อ-นามสกุล">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>เบอร์โทรศัพท์</label>
                            <input type="text" id="customerPhone" placeholder="0xx-xxx-xxxx">
                        </div>
                        <div class="form-group">
                            <label>อีเมล</label>
                            <input type="email" id="customerEmail" placeholder="email@example.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>ที่อยู่</label>
                        <textarea id="customerAddress" rows="2" placeholder="บ้านเลขที่ ซอย ถนน"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>แขวง/ตำบล</label>
                            <input type="text" id="customerSubdistrict" placeholder="แขวง/ตำบล">
                        </div>
                        <div class="form-group">
                            <label>เขต/อำเภอ</label>
                            <input type="text" id="customerDistrict" placeholder="เขต/อำเภอ">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>จังหวัด</label>
                            <input type="text" id="customerProvince" placeholder="จังหวัด">
                        </div>
                        <div class="form-group">
                            <label>รหัสไปรษณีย์</label>
                            <input type="text" id="customerPostalCode" placeholder="xxxxx">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>หมายเหตุ</label>
                        <textarea id="customerNotes" rows="2" placeholder="หมายเหตุเพิ่มเติม"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeCustomerModal()">ยกเลิก</button>
                    <button type="submit" class="btn-primary">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/global-alert.js"></script>
    <script>
        const API_URL = '/api';
        let customers = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCustomers();
        });

        async function loadCustomers() {
            try {
                const response = await fetch(`${API_URL}/reseller/customers`);
                if (!response.ok) throw new Error('Failed to load customers');
                
                const data = await response.json();
                customers = data.customers || [];
                renderCustomers(customers);
            } catch (error) {
                console.error('Error loading customers:', error);
            }
        }

        function renderCustomers(customersToRender) {
            const grid = document.getElementById('customersGrid');
            
            if (!customersToRender || customersToRender.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg>
                        <h3>ยังไม่มีข้อมูลลูกค้า</h3>
                        <p>คลิก "เพิ่มลูกค้า" เพื่อเริ่มต้น</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = customersToRender.map(customer => `
                <div class="customer-card">
                    <div class="customer-header">
                        <div class="customer-name">${customer.full_name}</div>
                        <div class="customer-actions">
                            <button class="btn-icon" onclick="editCustomer(${customer.id})" title="แก้ไข">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="btn-icon delete" onclick="deleteCustomer(${customer.id}, '${customer.full_name}')" title="ลบ">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="customer-info">
                        ${customer.phone ? `
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                                ${customer.phone}
                            </div>
                        ` : ''}
                        ${customer.email ? `
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                ${customer.email}
                            </div>
                        ` : ''}
                        ${customer.address || customer.province ? `
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span>
                                    ${customer.address ? customer.address + ' ' : ''}
                                    ${customer.subdistrict ? customer.subdistrict + ' ' : ''}
                                    ${customer.district ? customer.district + ' ' : ''}
                                    ${customer.province ? customer.province + ' ' : ''}
                                    ${customer.postal_code || ''}
                                </span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function searchCustomers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = customers.filter(c => 
                c.full_name.toLowerCase().includes(search) ||
                (c.phone && c.phone.includes(search)) ||
                (c.email && c.email.toLowerCase().includes(search))
            );
            renderCustomers(filtered);
        }

        function openAddCustomerModal() {
            document.getElementById('modalTitle').textContent = 'เพิ่มลูกค้าใหม่';
            document.getElementById('customerForm').reset();
            document.getElementById('customerId').value = '';
            document.getElementById('customerModal').classList.add('active');
        }

        function closeCustomerModal() {
            document.getElementById('customerModal').classList.remove('active');
        }

        async function editCustomer(id) {
            try {
                const response = await fetch(`${API_URL}/reseller/customers/${id}`);
                if (!response.ok) throw new Error('Failed to load customer');
                
                const data = await response.json();
                const customer = data.customer;
                
                document.getElementById('modalTitle').textContent = 'แก้ไขข้อมูลลูกค้า';
                document.getElementById('customerId').value = customer.id;
                document.getElementById('customerName').value = customer.full_name || '';
                document.getElementById('customerPhone').value = customer.phone || '';
                document.getElementById('customerEmail').value = customer.email || '';
                document.getElementById('customerAddress').value = customer.address || '';
                document.getElementById('customerSubdistrict').value = customer.subdistrict || '';
                document.getElementById('customerDistrict').value = customer.district || '';
                document.getElementById('customerProvince').value = customer.province || '';
                document.getElementById('customerPostalCode').value = customer.postal_code || '';
                document.getElementById('customerNotes').value = customer.notes || '';
                
                document.getElementById('customerModal').classList.add('active');
            } catch (error) {
                console.error('Error loading customer:', error);
                showAlert('เกิดข้อผิดพลาดในการโหลดข้อมูล', 'error');
            }
        }

        async function handleSaveCustomer(event) {
            event.preventDefault();
            
            const customerId = document.getElementById('customerId').value;
            const customerData = {
                full_name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('customerAddress').value,
                subdistrict: document.getElementById('customerSubdistrict').value,
                district: document.getElementById('customerDistrict').value,
                province: document.getElementById('customerProvince').value,
                postal_code: document.getElementById('customerPostalCode').value,
                notes: document.getElementById('customerNotes').value
            };
            
            try {
                const url = customerId 
                    ? `${API_URL}/reseller/customers/${customerId}` 
                    : `${API_URL}/reseller/customers`;
                const method = customerId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customerData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert(customerId ? 'อัปเดตข้อมูลสำเร็จ' : 'เพิ่มลูกค้าสำเร็จ', 'success');
                    closeCustomerModal();
                    loadCustomers();
                } else {
                    showAlert(result.error || 'เกิดข้อผิดพลาด', 'error');
                }
            } catch (error) {
                console.error('Error saving customer:', error);
                showAlert('เกิดข้อผิดพลาดในการบันทึก', 'error');
            }
        }

        async function deleteCustomer(id, name) {
            if (!confirm(`คุณต้องการลบลูกค้า "${name}" ใช่หรือไม่?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/reseller/customers/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('ลบลูกค้าสำเร็จ', 'success');
                    loadCustomers();
                } else {
                    showAlert(result.error || 'เกิดข้อผิดพลาด', 'error');
                }
            } catch (error) {
                console.error('Error deleting customer:', error);
                showAlert('เกิดข้อผิดพลาดในการลบ', 'error');
            }
        }

        function handleLogout() {
            window.location.href = '/logout';
        }
    </script>
</body>
</html>
